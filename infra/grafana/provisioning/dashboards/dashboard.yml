# ================================================================================
# Grafana Dashboard Provisioning — Vibranium Platform (dev)
# ================================================================================
# Carrega automaticamente os dashboards JSON do diretório /var/lib/grafana/dashboards.
# updateIntervalSeconds: verifica novos arquivos a cada 30s.
# ================================================================================

apiVersion: 1

providers:
  - name: 'Vibranium Dashboards'
    orgId: 1
    folder: 'Vibranium'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
