version: '3.8'

# ================================================================================
# AMBIENTE DE DESENVOLVIMENTO — Vibranium Platform
# ================================================================================
# Subir: docker compose -f infra/docker-compose.dev.yml up -d
# Parar:  docker compose -f infra/docker-compose.dev.yml down -v
#
# Regra de inicialização dos bancos:
#   O PostgreSQL executa `infra/postgres/init-app-databases.sh` no PRIMEIRO boot,
#   criando vibranium_orders e vibranium_wallet. Os serviços de aplicação aguardam
#   o healthcheck do postgres (que valida ambos os bancos) antes de subir.
#   O Flyway é responsável por TODAS as migrations — não há DDL manual aqui.
#   Se o banco não existir na URL de conexão, o serviço FALHA imediatamente.
# ================================================================================

services:
    # ================================================================================
    # MongoDB 7.0 — Banco de dados de eventos do order-service
    # ================================================================================
    mongodb:
        image: mongo:7.0
        container_name: vibranium-mongodb
        ports:
            - '27017:27017'
        environment:
            # Credenciais via .env (veja .env.example na raiz do projeto)
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required — copie .env.example para .env}
            MONGO_INITDB_DATABASE: vibranium_orders
        volumes:
            - mongodb_data:/data/db
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD-SHELL', 'mongosh "mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@localhost:27017/test?authSource=admin" --eval "db.runCommand(''ping'').ok" --quiet | grep -q "^1"']
            interval: 10s
            timeout: 5s
            retries: 5

    # ================================================================================
    # PostgreSQL 16 — Banco relacional compartilhado entre order-service e wallet-service
    # ================================================================================
    postgres:
        image: postgres:16-alpine
        container_name: vibranium-postgres
        ports:
            - '5432:5432'
        environment:
            # Credenciais via .env (veja .env.example na raiz do projeto)
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — copie .env.example para .env}
            # POSTGRES_DB é o banco padrão criado pelo entrypoint.
            # Os bancos de aplicação (vibranium_orders, vibranium_wallet)
            # são criados pelo script init-app-databases.sh abaixo.
            POSTGRES_DB: postgres
        volumes:
            - postgres_data:/var/lib/postgresql/data
            # Script centralizado: cria vibranium_orders e vibranium_wallet
            # com extensões e permissões necessárias para o Flyway.
            # Executado apenas no primeiro boot do container.
            - ./postgres/init-app-databases.sh:/docker-entrypoint-initdb.d/00-init-app-databases.sh:ro
        networks:
            - vibranium-network-dev
        healthcheck:
            # Valida AMBOS os bancos de aplicação antes de liberar os serviços:
            #   vibranium_orders  → order-service  (Flyway)
            #   vibranium_wallet  → wallet-service (Flyway)
            test:
                - 'CMD-SHELL'
                - >-
                    pg_isready -U ${POSTGRES_USER:-postgres} -d vibranium_orders &&
                    psql -U ${POSTGRES_USER:-postgres} -d vibranium_orders -c "SELECT 1" -q --no-align --tuples-only &&
                    psql -U ${POSTGRES_USER:-postgres} -d vibranium_wallet -c "SELECT 1" -q --no-align --tuples-only
            interval: 5s
            timeout: 5s
            retries: 15
            start_period: 20s

    # ================================================================================
    # Redis 7 — Cache e estruturas de dados para o order book (HFT)
    # ================================================================================
    redis:
        image: redis:7-alpine
        container_name: vibranium-redis
        ports:
            - '6379:6379'
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5

    # ================================================================================
    # RabbitMQ 3.13 — Message broker para eventos de domínio e auth (Keycloak plugin)
    # ================================================================================
    rabbitmq:
        image: rabbitmq:3.13-management-alpine
        container_name: vibranium-rabbitmq
        ports:
            - '5672:5672'
            - '15672:15672'
        environment:
            # Credenciais via .env (veja .env.example na raiz do projeto)
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?RABBITMQ_DEFAULT_PASS is required — copie .env.example para .env}
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5

    # ================================================================================
    # AT-14.1 — Jaeger v1.58 — Distributed Tracing (OTLP HTTP)
    # ================================================================================
    # UI:           http://localhost:16686  — visualizar traces end-to-end da Saga
    # OTLP HTTP:    http://localhost:4318   — recebe spans dos serviços (via Spring OTLP exporter)
    #
    # Como funciona OTLP (OpenTelemetry Protocol):
    #   1. Spring Boot (micrometer-tracing-bridge-otel) cria spans para cada request HTTP
    #      e listener AMQP.
    #   2. O opentelemetry-exporter-otlp empacota os spans em protobuf e faz POST para
    #      http://jaeger:4318/v1/traces a cada ~10s (intervalo padrão do OTel SDK).
    #   3. O Jaeger OTLP receiver aceita, armazena em memória e expõe na UI.
    #   4. A UI exibe o trace completo: placeOrder → FundsReserved → Match → Settlement.
    #
    # Impacto de sampling 100% (probability: 1.0):
    #   - Todos os spans são criados e exportados (sem descarte por amostragem).
    #   - Em dev: aceitável (baixo volume). Em prod: usar 0.1 ou tail-based sampling.
    #   - Com 500 ordens/s e span overhead ~5μs/span: ~2.5ms overhead total (≤1% do SLA).
    # ================================================================================
    jaeger:
        image: jaegertracing/all-in-one:1.58
        container_name: vibranium-jaeger-dev
        ports:
            - '16686:16686' # Jaeger UI (traces end-to-end visíveis aqui)
            - '4317:4317' # OTLP gRPC (alternativo ao HTTP)
            - '4318:4318' # OTLP HTTP (endpoint configurado nos serviços)
        environment:
            # Habilita o OTLP receiver HTTP + gRPC no Jaeger
            COLLECTOR_OTLP_ENABLED: 'true'
            # Armazena spans em memória (dev only).
            # Em produção, usar backend persistente: Elasticsearch, Cassandra ou OpenSearch.
            SPAN_STORAGE_TYPE: memory
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD-SHELL', 'wget --quiet --tries=1 --spider http://localhost:16686/ || exit 1']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    # ================================================================================
    # Keycloak Database — Banco dedicado para o Keycloak (separado dos bancos de app)
    # ================================================================================
    keycloak-db:
        image: postgres:16-alpine
        container_name: vibranium-keycloak-db-dev
        environment:
            # Credenciais do banco dedicado Keycloak via .env
            POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
            POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?KEYCLOAK_DB_PASSWORD is required — copie .env.example para .env}
            POSTGRES_DB: keycloak_db
        volumes:
            - keycloak_db_data:/var/lib/postgresql/data
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d keycloak_db']
            interval: 10s
            timeout: 5s
            retries: 5

    # ================================================================================
    # Keycloak 22 — Authentication & Authorization (dev)
    # Imagem customizada com plugin keycloak-event-listener-rabbitmq.
    # Ref: https://github.com/aznamier/keycloak-event-listener-rabbitmq
    # ================================================================================
    keycloak:
        build:
            # Context é o próprio diretório infra/ onde está o Dockerfile.keycloak
            context: .
            dockerfile: docker/Dockerfile.keycloak
        image: vibranium-keycloak:22.0.5
        container_name: vibranium-keycloak-dev
        ports:
            - '8180:8080'
        command:
            - start-dev
            - --import-realm
        environment:
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
            KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
            KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
            KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
            KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required — copie .env.example para .env}
            KC_HTTP_ENABLED: 'true'
            KC_HTTP_PORT: 8080
            KC_HOSTNAME_STRICT: 'false'
            KC_HEALTH_ENABLED: 'true'
            KC_METRICS_ENABLED: 'true'
            KC_LOG_LEVEL: INFO
            KC_CACHE: local
            # Plugin keycloak-event-listener-rabbitmq
            KK_TO_RMQ_URL: rabbitmq
            KK_TO_RMQ_PORT: 5672
            KK_TO_RMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
            KK_TO_RMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
            KK_TO_RMQ_VHOST: /
            KK_TO_RMQ_EXCHANGE: amq.topic
            KK_TO_RMQ_USE_TLS: 'false'
        volumes:
            - keycloak_dev_data:/opt/keycloak/data
            # Realm importado automaticamente via --import-realm na subida
            - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
        depends_on:
            keycloak-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/live HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200 OK" <&3']
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 60s

    # ================================================================================
    # Kong 3.4 — API Gateway (dev, mode DB-less via kong-init.yml declarativo)
    # Proxy: localhost:8000 | Admin API: localhost:8001
    # Produção usa mode=postgres (infra/docker-compose.staging.yml).
    # ================================================================================
    kong:
        image: kong:3.4
        container_name: vibranium-kong-dev
        environment:
            KONG_DATABASE: 'off'
            KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
            KONG_ADMIN_LISTEN: 0.0.0.0:8001
            KONG_PROXY_LISTEN: 0.0.0.0:8000
            KONG_LOG_LEVEL: warn
        ports:
            - '8000:8000'
            - '8001:8001'
        volumes:
            - ./kong/kong-init.yml:/etc/kong/kong.yml:ro
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD-SHELL', 'kong health 2>/dev/null | grep -q "Kong is healthy"']
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    # ================================================================================
    # Kong-init — Provisiona JWT consumer com a chave pública do Keycloak
    # Executa após Kong e Keycloak estarem healthy via kong-setup.sh
    # ================================================================================
    kong-init:
        image: alpine:3.19
        container_name: vibranium-kong-init-dev
        environment:
            KONG_ADMIN_URL: http://kong:8001
            KEYCLOAK_URL: http://keycloak:8080
            KEYCLOAK_REALM: vibranium-realm
            KONG_CONSUMER_NAME: keycloak-realm-consumer
            KEYCLOAK_ISSUER: http://localhost:8180/realms/vibranium-realm
        volumes:
            - ./kong/kong-setup.sh:/kong-setup.sh:ro
        command: ['sh', '/kong-setup.sh']
        depends_on:
            kong:
                condition: service_healthy
            keycloak:
                condition: service_healthy
        networks:
            - vibranium-network-dev

    # ================================================================================
    # order-service — Microsserviço Spring Boot com hot reload (dev)
    # Debug JDWP: localhost:5005
    # ================================================================================
    order-service:
        build:
            context: ..
            dockerfile: apps/order-service/docker/Dockerfile.dev
        container_name: vibranium-order-service-dev
        ports:
            - '8080:8080'
            - '5005:5005'
        environment:
            SERVER_PORT: 8080
            SPRING_APPLICATION_NAME: order-service
            SPRING_PROFILES_ACTIVE: dev
            JAVA_OPTS: '-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005'
            # Banco dedicado — evita shared-database anti-pattern
            # O Flyway FALHA se vibranium_orders não existir (garantido pelo healthcheck)
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vibranium_orders
            SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
            SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
            # Redis e MongoDB: sobrescrevem os defaults 'localhost' do application.yaml
            SPRING_DATA_REDIS_HOST: redis
            SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@mongodb:27017/vibranium_orders?authSource=admin
            SPRING_RABBITMQ_HOST: rabbitmq
            SPRING_RABBITMQ_PORT: '5672'
            SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
            SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
            # AT-14.1: OpenTelemetry — envia spans ao Jaeger via OTLP HTTP
            # OTEL_EXPORTER_OTLP_ENDPOINT sobrescreve o fallback 'localhost:4318' do application.yaml
            # O path /v1/traces é concatenado no application.yaml (management.otlp.tracing.endpoint)
            OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
            # Sampling 100%: todos os spans exportados em dev para visão completa no Jaeger
            MANAGEMENT_TRACING_SAMPLING_PROBABILITY: '1.0'
        volumes:
            - ../apps/order-service:/app/apps/order-service
            - ../libs:/app/libs
            - ../pom.xml:/app/pom.xml
            - m2_cache:/root/.m2
        working_dir: /app
        command: mvn spring-boot:run -pl apps/order-service -Dspring-boot.run.fork=false
        depends_on:
            # postgres healthy = vibranium_orders E vibranium_wallet existem e respondem
            postgres:
                condition: service_healthy
            mongodb:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            keycloak:
                condition: service_healthy
            jaeger:
                condition: service_healthy
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/actuator/health']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 60s

    # ================================================================================
    # wallet-service — Microsserviço Spring Boot com hot reload (dev)
    # Debug JDWP: localhost:5006
    # ================================================================================
    wallet-service:
        build:
            context: ..
            dockerfile: apps/wallet-service/docker/Dockerfile.dev
        container_name: vibranium-wallet-service-dev
        ports:
            - '8081:8081'
            - '5006:5006'
        environment:
            SERVER_PORT: 8081
            SPRING_APPLICATION_NAME: wallet-service
            SPRING_PROFILES_ACTIVE: dev
            JAVA_OPTS: '-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006'
            # Banco dedicado — o Flyway FALHA se vibranium_wallet não existir
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vibranium_wallet
            SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
            SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
            SPRING_RABBITMQ_HOST: rabbitmq
            SPRING_RABBITMQ_PORT: '5672'
            SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
            SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
            # AT-14.1: OpenTelemetry — envia spans ao Jaeger via OTLP HTTP
            OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
            MANAGEMENT_TRACING_SAMPLING_PROBABILITY: '1.0'
        volumes:
            - ../apps/wallet-service:/app/apps/wallet-service
            - ../libs:/app/libs
            - ../pom.xml:/app/pom.xml
            - m2_cache:/root/.m2
        working_dir: /app
        command: mvn spring-boot:run -pl apps/wallet-service -Dspring-boot.run.fork=false
        depends_on:
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            keycloak:
                condition: service_healthy
            jaeger:
                condition: service_healthy
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8081/actuator/health']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 60s

networks:
    vibranium-network-dev:
        driver: bridge

volumes:
    mongodb_data:
    postgres_data:
    redis_data:
    rabbitmq_data:
    keycloak_db_data:
    keycloak_dev_data:
    m2_cache:
