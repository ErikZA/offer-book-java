version: '3.8'

# ================================================================================
# Docker Secrets — credenciais lidas de arquivo em vez de variáveis de ambiente.
# Em staging/produção, secrets são montados em /run/secrets/<name> dentro do container.
# Visibilidade: `docker inspect` NÃO mostra o conteúdo dos secrets (apenas o nome).
#
# Criação dos arquivos:
#   echo "minha-senha" > infra/secrets/postgres_password.txt
#   echo "minha-senha" > infra/secrets/rabbitmq_password.txt
#   (ver docs/SECRETS_MANAGEMENT.md para instruções completas)
# ================================================================================
secrets:
    postgres_password:
        file: ./secrets/postgres_password.txt
    postgres_replication_password:
        file: ./secrets/postgres_replication_password.txt
    rabbitmq_password:
        file: ./secrets/rabbitmq_password.txt
    rabbitmq_erlang_cookie:
        file: ./secrets/rabbitmq_erlang_cookie.txt
    mongo_root_password:
        file: ./secrets/mongo_root_password.txt
    mongo_replica_key:
        file: ./secrets/mongo_replica_key.txt
    redis_password:
        file: ./secrets/redis_password.txt
    redis_kong_password:
        file: ./secrets/redis_kong_password.txt
    keycloak_admin_password:
        file: ./secrets/keycloak_admin_password.txt
    keycloak_db_password:
        file: ./secrets/keycloak_db_password.txt
    kong_db_password:
        file: ./secrets/kong_db_password.txt

services:
    # ================== MongoDB (3 Replicas) ==================
    mongodb-1:
        image: mongo:7.0
        container_name: vibranium-mongodb-1
        # docker-entrypoint-override-staging.sh: grava MONGO_REPLICA_KEY como keyFile antes
        # de chamar o entrypoint oficial. MongoDB 7 exige --keyFile quando --auth + --replSet
        # estão ativos juntos. Em staging o keyFile é FIXO e COMPARTILHADO pelos 3 nós —
        # diferente do dev onde é aleatório (single-node não precisa de consistência).
        entrypoint: ['bash', '/scripts/docker-entrypoint-override.sh']
        command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--keyFile', '/etc/mongod-keyfile']
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
            MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
            MONGO_INITDB_DATABASE: vibranium_orders
            # Chave compartilhada para intra-cluster auth do replica set rs0.
            # DEVE ser idêntica nos 3 nós — replica members rejeitam auth com keyFile diferente.
            MONGO_REPLICA_KEY_FILE: /run/secrets/mongo_replica_key
        secrets:
            - mongo_root_password
            - mongo_replica_key
        volumes:
            - mongodb_1_data:/data/db
            - ./mongo/docker-entrypoint-override-staging.sh:/scripts/docker-entrypoint-override.sh:ro
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD-SHELL', 'mongosh "mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@localhost:27017/test?authSource=admin" --eval "db.runCommand(''ping'').ok" --quiet | grep -q "^1"']
            interval: 10s
            timeout: 5s
            retries: 5

    mongodb-2:
        image: mongo:7.0
        container_name: vibranium-mongodb-2
        entrypoint: ['bash', '/scripts/docker-entrypoint-override.sh']
        command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--keyFile', '/etc/mongod-keyfile']
        ports:
            - '27018:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
            MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
            MONGO_INITDB_DATABASE: vibranium_orders
            MONGO_REPLICA_KEY_FILE: /run/secrets/mongo_replica_key
        secrets:
            - mongo_root_password
            - mongo_replica_key
        volumes:
            - mongodb_2_data:/data/db
            - ./mongo/docker-entrypoint-override-staging.sh:/scripts/docker-entrypoint-override.sh:ro
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD-SHELL', 'mongosh "mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@localhost:27017/test?authSource=admin" --eval "db.runCommand(''ping'').ok" --quiet | grep -q "^1"']
            interval: 10s
            timeout: 5s
            retries: 5

    mongodb-3:
        image: mongo:7.0
        container_name: vibranium-mongodb-3
        entrypoint: ['bash', '/scripts/docker-entrypoint-override.sh']
        command: ['mongod', '--replSet', 'rs0', '--bind_ip_all', '--keyFile', '/etc/mongod-keyfile']
        ports:
            - '27019:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
            MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
            MONGO_INITDB_DATABASE: vibranium_orders
            MONGO_REPLICA_KEY_FILE: /run/secrets/mongo_replica_key
        secrets:
            - mongo_root_password
            - mongo_replica_key
        volumes:
            - mongodb_3_data:/data/db
            - ./mongo/docker-entrypoint-override-staging.sh:/scripts/docker-entrypoint-override.sh:ro
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD-SHELL', 'mongosh "mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD}@localhost:27017/test?authSource=admin" --eval "db.runCommand(''ping'').ok" --quiet | grep -q "^1"']
            interval: 10s
            timeout: 5s
            retries: 5

    # ================== MongoDB Replica Set Init ==================
    # Container de curta duração: executa rs.initiate() com os 3 membros e sai
    # com código 0 após o PRIMARY ser eleito. Os order-services aguardam
    # service_completed_successfully antes de conectar ao MongoDB.
    mongo-rs-init:
        image: mongo:7.0
        container_name: vibranium-mongo-rs-init-staging
        environment:
            MONGO_ROOT_USER: ${MONGO_ROOT_USER:-admin}
            MONGO_ROOT_PASSWORD_FILE: /run/secrets/mongo_root_password
        secrets:
            - mongo_root_password
        volumes:
            - ./mongo/init-replica-set-staging.sh:/scripts/init-replica-set.sh:ro
        command: ['bash', '/scripts/init-replica-set.sh']
        depends_on:
            mongodb-1:
                condition: service_healthy
            mongodb-2:
                condition: service_healthy
            mongodb-3:
                condition: service_healthy
        networks:
            - vibranium-staging-network
        restart: 'no'

    # ================== PostgreSQL (Streaming Replication: 1 Primary + 2 Hot Standbys) ==================
    # Topologia: postgres-primary aceita writes; replica-1 e replica-2 são hot_standbys
    # (somente leitura). Todos os wallet-services apontam para o primary para garantir
    # consistência de escrita — as réplicas ficam disponíveis para leitura analítica futura.
    postgres-primary:
        image: postgres:16-alpine
        container_name: vibranium-postgres-primary
        # Parâmetros de replicação passados diretamente ao postgres — têm precedência
        # sobre postgresql.conf e não exigem SIGHUP. wal_keep_size=64MB garante que
        # réplicas lentas não percam segmentos WAL essenciais ao reconectar.
        command: >
            postgres
            -c wal_level=replica
            -c max_wal_senders=3
            -c max_replication_slots=2
            -c wal_keep_size=64
            -c hot_standby=on
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
            POSTGRES_DB: vibranium_wallet
            # Senha do usuário `replicator` criado pelo script 01-init-replication.sh.
            # Deve ser a mesma em postgres-replica-1 e postgres-replica-2.
            POSTGRES_REPLICATION_PASSWORD_FILE: /run/secrets/postgres_replication_password
        secrets:
            - postgres_password
            - postgres_replication_password
        volumes:
            - postgres_primary_data:/var/lib/postgresql/data
            # Script de inicialização executado pelo docker-entrypoint.sh após o initdb.
            # Cria o usuário `replicator` e configura pg_hba.conf para replicação.
            - ./postgres/pg-primary-init.sh:/docker-entrypoint-initdb.d/01-init-replication.sh:ro
            - ./postgres/init-postgres.sql:/docker-entrypoint-initdb.d/02-init-schema.sql:ro
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            # pg_isready -U postgres: verifica se o servidor aceita conexões.
            # As réplicas dependem do healthcheck do primary para disparar pg_basebackup.
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 10s
            timeout: 5s
            retries: 5

    postgres-replica-1:
        image: postgres:16-alpine
        container_name: vibranium-postgres-replica-1
        # Entrypoint customizado: substitui o docker-entrypoint.sh padrão.
        # Executa pg_basebackup no primary, cria standby.signal e configura
        # primary_conninfo — iniciando o nó como hot_standby (somente leitura).
        entrypoint: ['/bin/bash', '/scripts/pg-replica-entrypoint.sh']
        ports:
            - '5433:5432'
        environment:
            PGDATA: /var/lib/postgresql/data
            POSTGRES_PRIMARY_HOST: postgres-primary
            POSTGRES_PRIMARY_PORT: '5432'
            POSTGRES_REPLICATION_USER: replicator
            POSTGRES_REPLICATION_PASSWORD_FILE: /run/secrets/postgres_replication_password
        secrets:
            - postgres_replication_password
        volumes:
            - postgres_replica_1_data:/var/lib/postgresql/data
            - ./postgres/pg-replica-entrypoint.sh:/scripts/pg-replica-entrypoint.sh:ro
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        depends_on:
            postgres-primary:
                # Aguarda o primary estar healthy antes de disparar pg_basebackup.
                # O healthcheck do primary (pg_isready) garante que initdb + init scripts
                # já foram executados (usuário replicator e pg_hba.conf configurados).
                condition: service_healthy
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready']
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s

    postgres-replica-2:
        image: postgres:16-alpine
        container_name: vibranium-postgres-replica-2
        entrypoint: ['/bin/bash', '/scripts/pg-replica-entrypoint.sh']
        ports:
            - '5434:5432'
        environment:
            PGDATA: /var/lib/postgresql/data
            POSTGRES_PRIMARY_HOST: postgres-primary
            POSTGRES_PRIMARY_PORT: '5432'
            POSTGRES_REPLICATION_USER: replicator
            POSTGRES_REPLICATION_PASSWORD_FILE: /run/secrets/postgres_replication_password
        secrets:
            - postgres_replication_password
        volumes:
            - postgres_replica_2_data:/var/lib/postgresql/data
            - ./postgres/pg-replica-entrypoint.sh:/scripts/pg-replica-entrypoint.sh:ro
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        depends_on:
            postgres-primary:
                condition: service_healthy
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready']
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 60s

    # ================== Redis (3 Replicas via Cluster) ==================
    redis-1:
        image: redis:7-alpine
        container_name: vibranium-redis-1
        ports:
            - '6379:6379'
        # --cluster-enabled yes: liga o modo cluster; o slot map é criado por redis-cluster-init.
        # --cluster-node-timeout 5000: um nó é considerado falho após 5 s sem heartbeat.
        # --cluster-config-file: cada nó persiste seu view do cluster em /data/nodes.conf.
        # --requirepass: autenticação obrigatória via Docker Secret.
        # A senha é lida do arquivo montado em /run/secrets/redis_password pelo entrypoint.
        entrypoint: ['sh', '-c', 'redis-server --appendonly yes --cluster-enabled yes --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000 --port 6379 --requirepass "$$(cat /run/secrets/redis_password)"']
        secrets:
            - redis_password
        volumes:
            - redis_1_data:/data
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            # redis-cli PING retorna "PONG" → exit 0; qualquer outro resultado → exit 1.
            # interval/retries conservadores para evitar que redis-cluster-init dispare
            # antes dos nós estarem prontos para receber conexões.
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', '-p', '6379', 'ping']
            interval: 5s
            timeout: 3s
            retries: 10

    redis-2:
        image: redis:7-alpine
        container_name: vibranium-redis-2
        ports:
            - '6380:6379'
        entrypoint: ['sh', '-c', 'redis-server --appendonly yes --cluster-enabled yes --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000 --port 6379 --requirepass "$$(cat /run/secrets/redis_password)"']
        secrets:
            - redis_password
        volumes:
            - redis_2_data:/data
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', '-p', '6379', 'ping']
            interval: 5s
            timeout: 3s
            retries: 10
        depends_on:
            redis-1:
                condition: service_healthy

    redis-3:
        image: redis:7-alpine
        container_name: vibranium-redis-3
        ports:
            - '6381:6379'
        entrypoint: ['sh', '-c', 'redis-server --appendonly yes --cluster-enabled yes --cluster-config-file /data/nodes.conf --cluster-node-timeout 5000 --port 6379 --requirepass "$$(cat /run/secrets/redis_password)"']
        secrets:
            - redis_password
        volumes:
            - redis_3_data:/data
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', '-p', '6379', 'ping']
            interval: 5s
            timeout: 3s
            retries: 10
        depends_on:
            redis-1:
                condition: service_healthy

    # ================== Redis Cluster Init ==================
    # Container de curta duração: executa `redis-cli --cluster create` com os 3 nós e sai
    # com código 0 após o cluster estar formado (16384 hash slots distribuídos).
    # --cluster-replicas 0: sem replicas — staging usa 3 primários sem redundância interna.
    # Os order-services aguardam service_completed_successfully para garantir que comandos
    # Lua (EVAL) sejam executados contra um cluster com slot map válido.
    #
    # Risco — hash tags {vibranium}: todas as chaves do motor de match usam a hash tag
    # {vibranium}, o que força todos os slots para o mesmo nó. Isso é INTENCIONAL para
    # garantir que o script Lua multi-key seja executado atomicamente em um único shard.
    # Com --cluster-replicas 0 e 3 primários, o slot {vibranium} cai em apenas 1 dos 3
    # nós — os outros 2 ficarão ociosos para essas chaves (aceitável em staging).
    redis-cluster-init:
        image: redis:7-alpine
        container_name: vibranium-redis-cluster-init
        secrets:
            - redis_password
        # Cada nó deve ser referenciado pelo nome DNS interno que outros containers usam
        # para se conectar — NÃO pelas portas do host (6380/6381 são apenas para acesso externo).
        # Todos os 3 containers escutam na porta 6379 dentro da rede Docker.
        # A senha é lida de /run/secrets/redis_password em vez de variável de ambiente.
        command: >
            sh -c '
              REDIS_PASS=$$(cat /run/secrets/redis_password)
              echo "Aguardando nós Redis estarem prontos..."
              redis-cli --cluster create
                redis-1:6379
                redis-2:6379
                redis-3:6379
                --cluster-replicas 0
                --cluster-yes
                -a $$REDIS_PASS
              echo "Cluster criado! Verificando estado:"
              redis-cli -h redis-1 -p 6379 -a $$REDIS_PASS cluster info | grep cluster_state
            '
        networks:
            - vibranium-staging-network
        depends_on:
            redis-1:
                condition: service_healthy
            redis-2:
                condition: service_healthy
            redis-3:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 64M
                reservations:
                    cpus: '0.1'
        restart: 'no'

    # ================== RabbitMQ (3 Replicas) ==================
    rabbitmq-1:
        image: rabbitmq:3.13-management-alpine
        container_name: vibranium-rabbitmq-1
        ports:
            - '5672:5672'
            - '15672:15672'
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
            RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
            RABBITMQ_ERLANG_COOKIE_FILE: /run/secrets/rabbitmq_erlang_cookie
            RABBITMQ_NODENAME: rabbit@rabbitmq-1
        secrets:
            - rabbitmq_password
            - rabbitmq_erlang_cookie
        volumes:
            - rabbitmq_1_data:/var/lib/rabbitmq
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
            interval: 10s
            timeout: 5s
            retries: 10
            # Aguarda o boot inicial do broker antes de contar os retries — evita que o
            # container seja marcado unhealthy durante o startup lento da VM Erlang.
            start_period: 20s

    rabbitmq-2:
        image: rabbitmq:3.13-management-alpine
        container_name: vibranium-rabbitmq-2
        # join-cluster.sh: inicia rabbitmq-server em background via entrypoint oficial,
        # aguarda o nó local responder a `rabbitmq-diagnostics ping`, depois executa
        # stop_app / reset / join_cluster rabbit@rabbitmq-1 / start_app e devolve o
        # controle ao processo RabbitMQ em foreground. O cookie Erlang compartilhado
        # (via Docker Secret) autentica a conexão entre os nós durante o join.
        entrypoint: ['/bin/sh', '/scripts/join-cluster.sh']
        ports:
            - '5673:5672'
            - '15673:15672'
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
            RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
            RABBITMQ_ERLANG_COOKIE_FILE: /run/secrets/rabbitmq_erlang_cookie
            RABBITMQ_NODENAME: rabbit@rabbitmq-2
        secrets:
            - rabbitmq_password
            - rabbitmq_erlang_cookie
        volumes:
            - rabbitmq_2_data:/var/lib/rabbitmq
            # Script montado como somente leitura — não polui o volume de dados do broker.
            - ./rabbitmq/join-cluster.sh:/scripts/join-cluster.sh:ro
        networks:
            - vibranium-staging-network
        depends_on:
            # service_healthy garante que rabbitmq-1 aceita conexões Erlang antes do
            # join_cluster — sem isso há race condition no handshake do distribution.
            rabbitmq-1:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            # Valida responsividade do broker E associação ao cluster.
            # O container só fica healthy após join_cluster rabbitmq-1 concluído,
            # garantindo que rabbitmq-cluster-init encontre os 3 nós formados.
            test: ['CMD-SHELL', 'rabbitmq-diagnostics -q ping && rabbitmqctl cluster_status | grep -q "rabbit@rabbitmq-1"']
            interval: 10s
            timeout: 10s
            retries: 15
            start_period: 30s

    rabbitmq-3:
        image: rabbitmq:3.13-management-alpine
        container_name: vibranium-rabbitmq-3
        # Mesma estratégia de join-cluster.sh do rabbitmq-2 — ver comentário acima.
        entrypoint: ['/bin/sh', '/scripts/join-cluster.sh']
        ports:
            - '5674:5672'
            - '15674:15672'
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
            RABBITMQ_DEFAULT_PASS_FILE: /run/secrets/rabbitmq_password
            RABBITMQ_ERLANG_COOKIE_FILE: /run/secrets/rabbitmq_erlang_cookie
            RABBITMQ_NODENAME: rabbit@rabbitmq-3
        secrets:
            - rabbitmq_password
            - rabbitmq_erlang_cookie
        volumes:
            - rabbitmq_3_data:/var/lib/rabbitmq
            - ./rabbitmq/join-cluster.sh:/scripts/join-cluster.sh:ro
        networks:
            - vibranium-staging-network
        depends_on:
            rabbitmq-1:
                condition: service_healthy
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD-SHELL', 'rabbitmq-diagnostics -q ping && rabbitmqctl cluster_status | grep -q "rabbit@rabbitmq-1"']
            interval: 10s
            timeout: 10s
            retries: 15
            start_period: 30s

    # ================== RabbitMQ Cluster Init ==================
    # Container de curta duração: aguarda os 3 nós estarem healthy (join concluído),
    # aplica a policy ha-all em todas as filas e encerra com código 0.
    # Serviços de aplicação aguardam service_completed_successfully antes de conectar.
    rabbitmq-cluster-init:
        image: rabbitmq:3.13-management-alpine
        container_name: vibranium-rabbitmq-cluster-init
        restart: 'no'
        entrypoint: ['/bin/sh']
        command:
            - -c
            - |
                # Lê o cookie Erlang do Docker Secret (arquivo montado em /run/secrets/).
                # Permissão 400 é exigida pelo OTP.
                cp /run/secrets/rabbitmq_erlang_cookie /root/.erlang.cookie
                chmod 400 /root/.erlang.cookie

                echo '[cluster-init] Verificando status do cluster...'
                rabbitmqctl -n rabbit@rabbitmq-1 cluster_status --formatter=compact

                echo '[cluster-init] Aplicando policy ha-all em todas as filas...'
                # ha-mode: all — todas as filas são espelhadas nos 3 nós.
                # ha-sync-mode: automatic — novos mirrors sincronizam automaticamente
                # sem intervenção manual após o join de um nó.
                # apply-to: queues — não afeta exchanges nem bindings.
                rabbitmqctl -n rabbit@rabbitmq-1 set_policy ha-all '.*' \
                    '{"ha-mode":"all","ha-sync-mode":"automatic"}' \
                    --apply-to queues

                echo '[cluster-init] Policy aplicada com sucesso.'
                rabbitmqctl -n rabbit@rabbitmq-1 list_policies

                echo '[cluster-init] Cluster RabbitMQ formado e HA configurado.'
        secrets:
            - rabbitmq_erlang_cookie
        depends_on:
            # Os 3 nós devem estar healthy (join concluído via healthcheck de cluster_status)
            # antes de tentar aplicar a policy — garante que a replicação está ativa.
            rabbitmq-1:
                condition: service_healthy
            rabbitmq-2:
                condition: service_healthy
            rabbitmq-3:
                condition: service_healthy
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 64M
                    cpus: '0.1'

    # ================== Order Service (3 Replicas) ==================
    # ——— NOTA: Os order-services aguardam rabbitmq-cluster-init (service_completed_successfully)
    #     em vez de rabbitmq-1 standalone — garante HA ativa no momento da primeira conexão.
    order-service-1:
        image: order-service:latest
        container_name: vibranium-order-service-1
        ports:
            - '8080:8080'
        environment:
            SPRING_APPLICATION_NAME: order-service
            # Todos os 3 membros do replica set + replicaSet=rs0 para failover automático.
            # O driver MongoDB redireciona operações de escrita ao PRIMARY e leituras
            # podem ir a SECONDARY (conforme readPreference configurado na aplicação).
            SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb-1:27017,mongodb-2:27017,mongodb-3:27017/vibranium_orders?authSource=admin&replicaSet=rs0
            SPRING_REDIS_HOST: redis-1
            SPRING_REDIS_PORT: 6379
            # Credenciais de Redis e RabbitMQ injetadas via Docker Secrets (/run/secrets/)
            # O DockerSecretEnvironmentPostProcessor lê automaticamente e sobrescreve as properties.
            SPRING_RABBITMQ_HOST: rabbitmq-1
            SPRING_RABBITMQ_PORT: 5672
            SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
        secrets:
            - redis_password
            - rabbitmq_password
        depends_on:
            # Aguarda o replica set rs0 estar completamente formado (PRIMARY eleito)
            # antes de conectar — evita falha de MongoTransactionManager no boot.
            mongo-rs-init:
                condition: service_completed_successfully
            # Aguarda o cluster Redis ser inicializado (16384 slots distribuídos) antes de
            # subir o order-service — garante que scripts Lua (EVAL) não falhem com
            # CLUSTERDOWN: Hash slot not served no primeiro startup.
            redis-cluster-init:
                condition: service_completed_successfully
            # Aguarda o cluster RabbitMQ estar formado (3 nós) e a policy ha-all aplicada
            # antes de o order-service conectar — filas criadas pelo Spring já nascem com
            # replicação HA habilitada e não precisam de migrate/recreate posterior.
            rabbitmq-cluster-init:
                condition: service_completed_successfully
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'
                reservations:
                    cpus: '0.25'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:8080/actuator/health']
            interval: 15s
            timeout: 5s
            retries: 5

    order-service-2:
        image: order-service:latest
        container_name: vibranium-order-service-2
        ports:
            - '8081:8080'
        environment:
            SPRING_APPLICATION_NAME: order-service
            SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb-1:27017,mongodb-2:27017,mongodb-3:27017/vibranium_orders?authSource=admin&replicaSet=rs0
            SPRING_REDIS_HOST: redis-2
            SPRING_REDIS_PORT: 6379
            SPRING_RABBITMQ_HOST: rabbitmq-2
            SPRING_RABBITMQ_PORT: 5672
            SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
        secrets:
            - redis_password
            - rabbitmq_password
        depends_on:
            - order-service-1
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'
                reservations:
                    cpus: '0.25'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:8080/actuator/health']
            interval: 15s
            timeout: 5s
            retries: 5

    order-service-3:
        image: order-service:latest
        container_name: vibranium-order-service-3
        ports:
            - '8082:8080'
        environment:
            SPRING_APPLICATION_NAME: order-service
            SPRING_DATA_MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}@mongodb-1:27017,mongodb-2:27017,mongodb-3:27017/vibranium_orders?authSource=admin&replicaSet=rs0
            SPRING_REDIS_HOST: redis-3
            SPRING_REDIS_PORT: 6379
            SPRING_RABBITMQ_HOST: rabbitmq-3
            SPRING_RABBITMQ_PORT: 5672
            SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
        secrets:
            - redis_password
            - rabbitmq_password
        depends_on:
            - order-service-1
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'
                reservations:
                    cpus: '0.25'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:8080/actuator/health']
            interval: 15s
            timeout: 5s
            retries: 5

    # ================== Wallet Service (3 Replicas) ==================
    wallet-service-1:
        image: wallet-service:latest
        container_name: vibranium-wallet-service-1
        ports:
            - '8083:8081'
        environment:
            SPRING_APPLICATION_NAME: wallet-service
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-primary:5432/vibranium_wallet
            SPRING_DATASOURCE_USERNAME: postgres
            # Credenciais injetadas via Docker Secrets (/run/secrets/) —
            # DockerSecretEnvironmentPostProcessor lê automaticamente.
            SPRING_RABBITMQ_HOST: rabbitmq-1
            SPRING_RABBITMQ_PORT: 5672
            SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
        secrets:
            - postgres_password
            - rabbitmq_password
        depends_on:
            # service_healthy garante que initdb + pg-primary-init.sh + init-postgres.sql
            # já foram executados (schema vibranium criado) antes do Flyway conectar.
            # service_started seria insuficiente — o HikariCP tentaria conectar antes
            # do banco estar pronto, causando falha no primeiro boot.
            postgres-primary:
                condition: service_healthy
            # Aguarda cluster RabbitMQ completo (ha-all policy ativa) antes de conectar —
            # garante que filas criadas no boot já são espelhadas nos 3 nós.
            rabbitmq-cluster-init:
                condition: service_completed_successfully
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'
                reservations:
                    cpus: '0.25'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:8081/actuator/health']
            interval: 15s
            timeout: 5s
            retries: 5

    wallet-service-2:
        image: wallet-service:latest
        container_name: vibranium-wallet-service-2
        ports:
            - '8084:8081'
        environment:
            SPRING_APPLICATION_NAME: wallet-service
            # BUG CORRIGIDO (5.1.3): apontava para postgres-replica-1 (read-only hot_standby).
            # Réplicas não aceitam writes (INSERT/UPDATE/DELETE) — causaria erros de
            # "cannot execute INSERT in a read-only transaction" em produção.
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-primary:5432/vibranium_wallet
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_RABBITMQ_HOST: rabbitmq-2
            SPRING_RABBITMQ_PORT: 5672
            SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
        secrets:
            - postgres_password
            - rabbitmq_password
        depends_on:
            - wallet-service-1
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'
                reservations:
                    cpus: '0.25'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:8081/actuator/health']
            interval: 15s
            timeout: 5s
            retries: 5

    wallet-service-3:
        image: wallet-service:latest
        container_name: vibranium-wallet-service-3
        ports:
            - '8085:8081'
        environment:
            SPRING_APPLICATION_NAME: wallet-service
            # BUG CORRIGIDO (5.1.3): apontava para postgres-replica-2 (read-only hot_standby).
            # Todos os wallet-services devem apontar para o primary para garantir
            # consistência de escrita. Réplicas ficam disponíveis apenas para leitura futura.
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-primary:5432/vibranium_wallet
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_RABBITMQ_HOST: rabbitmq-3
            SPRING_RABBITMQ_PORT: 5672
            SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
        secrets:
            - postgres_password
            - rabbitmq_password
        depends_on:
            - wallet-service-1
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'
                reservations:
                    cpus: '0.25'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:8081/actuator/health']
            interval: 15s
            timeout: 5s
            retries: 5

    # ================== Keycloak + Plugin RabbitMQ ==================

    # Banco de dados dedicado ao Keycloak (staging)
    keycloak-db:
        image: postgres:16-alpine
        container_name: vibranium-keycloak-db-staging
        environment:
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD_FILE: /run/secrets/keycloak_db_password
            POSTGRES_DB: keycloak_db
        secrets:
            - keycloak_db_password
        volumes:
            - keycloak_db_staging_data:/var/lib/postgresql/data
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U keycloak -d keycloak_db']
            interval: 10s
            timeout: 5s
            retries: 5

    # Keycloak 22 - Authentication & Authorization (staging)
    # Plugin keycloak-event-listener-rabbitmq publica eventos de auth no RabbitMQ.
    # Referência: https://github.com/aznamier/keycloak-event-listener-rabbitmq
    keycloak:
        # Imagem customizada com o plugin JAR (build context = diretório infra/)
        build:
            context: .
            dockerfile: docker/Dockerfile.keycloak
        image: vibranium-keycloak:22.0.5
        container_name: vibranium-keycloak-staging
        ports:
            - '8080:8080'
        # start --optimized aproveita o build otimizado feito no Dockerfile
        # --import-realm importa automaticamente JSONs de /opt/keycloak/data/import/
        command:
            - start
            - --optimized
            - --import-realm
        environment:
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD_FILE: /run/secrets/keycloak_db_password

            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password

            KC_HTTP_ENABLED: 'true'
            KC_HTTP_PORT: 8080
            KC_HOSTNAME_STRICT: 'false'
            KC_HOSTNAME: keycloak
            KC_PROXY: edge
            KC_PROXY_HEADERS: xforwarded

            KC_HEALTH_ENABLED: 'true'
            KC_METRICS_ENABLED: 'true'

            KC_LOG_LEVEL: WARN
            KC_CACHE: local

            # ---------------------------------------------------------------
            # Plugin keycloak-event-listener-rabbitmq
            # Conecta ao rabbitmq-1 (nó primário do cluster staging)
            # ---------------------------------------------------------------
            KK_TO_RMQ_URL: rabbitmq-1
            KK_TO_RMQ_PORT: 5672
            KK_TO_RMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
            KK_TO_RMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
            KK_TO_RMQ_VHOST: /
            KK_TO_RMQ_EXCHANGE: amq.topic
            KK_TO_RMQ_USE_TLS: 'false'
        secrets:
            - keycloak_db_password
            - keycloak_admin_password
            - rabbitmq_password
        volumes:
            - keycloak_staging_data:/opt/keycloak/data
            # Realm importado automaticamente na subida
            - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
        depends_on:
            keycloak-db:
                condition: service_healthy
            rabbitmq-1:
                condition: service_healthy
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 1024M
                reservations:
                    cpus: '0.5'
                    memory: 512M
        healthcheck:
            test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/live HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200 OK" <&3']
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 90s

    # ================== Redis-Kong (Rate-Limiting dedicado) ==================
    # Redis isolado para rate-limiting distribuído do Kong.
    # NÃO compartilha dados com os redis-1/2/3 das aplicações.
    # Os redis de aplicação usam cluster mode — Kong rate-limiting não suporta
    # Redis Cluster nativamente, requer standalone ou Sentinel.
    # Usa db=1 como namespace isolado (aplicações usam db=0 por padrão).
    # Porta NÃO exposta: acesso apenas interno via vibranium-staging-network.
    redis-kong:
        image: redis:7-alpine
        container_name: vibranium-redis-kong-staging
        restart: unless-stopped
        # requirepass via Docker Secret — senha dedicada ao Redis do Kong (diferente do app).
        # appendonly=no: contadores de rate-limiting são voláteis por design.
        entrypoint: ['sh', '-c', 'redis-server --appendonly no --save "" --requirepass "$$(cat /run/secrets/redis_kong_password)"']
        secrets:
            - redis_kong_password
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 64M
                reservations:
                    cpus: '0.10'
        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_KONG_PASSWORD}', 'ping']
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 10s

    # ================== Kong + Konga ==================
    kong-database:
        image: postgres:16-alpine
        container_name: kong-db-staging
        environment:
            POSTGRES_USER: kong
            POSTGRES_PASSWORD_FILE: /run/secrets/kong_db_password
            POSTGRES_DB: kong
        secrets:
            - kong_db_password
        volumes:
            - kong_db_staging_data:/var/lib/postgresql/data
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U kong -d kong']
            interval: 10s
            timeout: 5s
            retries: 5

    kong-migration:
        image: kong:3.4
        container_name: kong-migration-staging
        command: kong migrations bootstrap -v
        environment:
            KONG_DATABASE: postgres
            KONG_PG_HOST: kong-database
            KONG_PG_PORT: 5432
            KONG_PG_USER: kong
            KONG_PG_PASSWORD_FILE: /run/secrets/kong_db_password
        secrets:
            - kong_db_password
        depends_on:
            kong-database:
                condition: service_healthy
        networks:
            - vibranium-staging-network

    kong:
        image: kong:3.4
        container_name: vibranium-kong-staging
        ports:
            - '8000:8000'
            - '8443:8443'
            - '8001:8001'
            - '8444:8444'
        environment:
            KONG_DATABASE: postgres
            KONG_PG_HOST: kong-database
            KONG_PG_PORT: 5432
            KONG_PG_USER: kong
            KONG_PG_PASSWORD_FILE: /run/secrets/kong_db_password
            KONG_PROXY_ACCESS_LOG: /dev/stdout
            KONG_ADMIN_ACCESS_LOG: /dev/stdout
        secrets:
            - kong_db_password
        depends_on:
            kong-migration:
                condition: service_completed_successfully
            redis-kong:
                condition: service_healthy
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 512M
                reservations:
                    cpus: '0.5'
        healthcheck:
            test: ['CMD-SHELL', 'kong health 2>/dev/null | grep -q "Kong is healthy"']
            interval: 15s
            timeout: 10s
            retries: 5
            start_period: 30s

    # ================== Kong Init (Staging) ==================
    # Container de curta duração: provisiona services, routes, plugins JWT RS256,
    # rate-limiting Redis e credencial JWKS no Kong via Admin API.
    # Executa kong/kong-setup.sh (264 linhas, 100% idempotente via PUT).
    # Equivalente ao kong-init do compose de produção (infra/docker-compose.yml L348).
    kong-init:
        build:
            # Build context = infra/ — acessa kong/kong-setup.sh e docker/Dockerfile.kong-init
            context: .
            dockerfile: docker/Dockerfile.kong-init
        container_name: vibranium-kong-init-staging
        restart: 'no'
        environment:
            KONG_ADMIN_URL: http://kong:8001
            KEYCLOAK_URL: http://keycloak:8080
            KEYCLOAK_REALM: orderbook-realm
            KONG_CONSUMER_NAME: keycloak-realm-consumer
            # Em staging o Keycloak está mapeado para localhost:8080 (porta 8080:8080).
            # O `iss` dos JWTs emitidos usa o hostname acessível ao cliente — em staging
            # é localhost:8080. Em ambiente com DNS público, substituir pela URL externa.
            KEYCLOAK_ISSUER: http://localhost:8080/realms/orderbook-realm
            REDIS_KONG_PASSWORD_FILE: /run/secrets/redis_kong_password
        secrets:
            - redis_kong_password
        depends_on:
            kong:
                condition: service_healthy
            keycloak:
                condition: service_healthy
            redis-kong:
                condition: service_healthy
        networks:
            - vibranium-staging-network
        deploy:
            resources:
                limits:
                    memory: 128M
                reservations:
                    cpus: '0.25'
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
                labels: 'service=kong-init-staging'

networks:
    vibranium-staging-network:
        driver: bridge

volumes:
    mongodb_1_data:
    mongodb_2_data:
    mongodb_3_data:
    postgres_primary_data:
    postgres_replica_1_data:
    postgres_replica_2_data:
    redis_1_data:
    redis_2_data:
    redis_3_data:
    rabbitmq_1_data:
    rabbitmq_2_data:
    rabbitmq_3_data:
    keycloak_db_staging_data:
    keycloak_staging_data:
    kong_db_staging_data:
