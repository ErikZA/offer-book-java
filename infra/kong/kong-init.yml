_format_version: '3.0'
_transform: true

services:
    - name: order-service
      url: http://order-service:8080
      routes:
          - name: place-order-route
            paths: [/api/v1/orders]
            methods: [POST, OPTIONS]
          - name: list-orders-route
            paths: [/api/v1/orders]
            methods: [GET, OPTIONS]
      plugins:
          - name: jwt
            config:
                key_claim_name: iss
                claims_to_verify: [exp]

    - name: wallet-service
      url: http://wallet-service:8081
      routes:
          - name: get-wallet-route
            paths: [/api/v1/wallets]
            methods: [GET, OPTIONS]
      plugins:
          - name: jwt
            config:
                key_claim_name: iss
                claims_to_verify: [exp]

