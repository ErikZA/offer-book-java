# =============================================================================
# AT-15 — Redis Cluster Configuration (Produção / HA)
#
# Configuração base para cada nó do Redis Cluster (6 nodes: 3 masters + 3 replicas).
# Este arquivo é montado em /usr/local/etc/redis/redis.conf e referenciado
# pelo entrypoint do container antes de flags adicionais do docker-compose.
#
# Referência: https://redis.io/docs/latest/operate/oss_and_stack/management/scaling/
# =============================================================================

# --- Cluster ---
cluster-enabled yes
cluster-config-file /data/nodes.conf
cluster-node-timeout 5000

# Permite que o cluster continue operando mesmo com um master down.
# Sem esta flag, qualquer slot sem cobertura faz o cluster inteiro
# retornar CLUSTERDOWN — inaceitável para HA do Order Book.
cluster-require-full-coverage no

# --- Persistência ---
# AOF habilitado para durabilidade do Order Book em caso de restart do nó.
# fsync a cada segundo: compromisso entre performance e durabilidade.
appendonly yes
appendfsync everysec

# RDB snapshot como backup secundário (a cada 60s se >= 1000 writes).
save 60 1000

# --- Rede ---
# Bind em todas as interfaces — segurança via rede Docker isolada + requirepass.
bind 0.0.0.0
protected-mode no

# --- Memória ---
# Limite de memória por nó: ajustar conforme o ambiente.
# Em produção, alinhar com deploy.resources.limits.memory do docker-compose.
# maxmemory 512mb
# maxmemory-policy noeviction

# --- Performance ---
# Desabilita slow log verboso; mantém latência baixa.
slowlog-log-slower-than 10000
slowlog-max-len 128

# TCP keepalive para detectar conexões mortas mais rápido.
tcp-keepalive 60

# --- Logging ---
loglevel notice
