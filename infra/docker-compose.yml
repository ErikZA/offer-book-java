version: '3.8'

# ================================================================================
# INFRAESTRUTURA GERAL — PostgreSQL 16 + Kong 3.4 + Keycloak 22 + RabbitMQ
# ================================================================================
# Sobe a infraestrutura compartilhada (não inclui serviços de aplicação).
# Para desenvolvimento local use: docker-compose.dev.yml
# Para staging com réplicas use:  docker-compose.staging.yml
#
# Subir: docker compose --env-file .env -f infra/docker-compose.yml up -d
# Parar: docker compose --env-file .env -f infra/docker-compose.yml down
#
# SEGURANÇA (SecOps):
# - Isolamento de rede Docker
# - Limites de recursos CPU/Memória
# - Restart policy: unless-stopped
# - Credenciais via Docker Secrets (arquivos em /run/secrets/)
# - Portas administrativas restritas ao loopback onde possível
# ================================================================================

# ================================================================================
# Docker Secrets — credenciais lidas de arquivo em vez de variáveis de ambiente.
# `docker inspect` NÃO mostra o conteúdo dos secrets (apenas o nome).
# Veja docs/SECRETS_MANAGEMENT.md para instruções de criação e rotação.
# ================================================================================
secrets:
    postgres_password:
        file: ./secrets/postgres_password.txt
    rabbitmq_password:
        file: ./secrets/rabbitmq_password.txt
    keycloak_admin_password:
        file: ./secrets/keycloak_admin_password.txt
    redis_kong_password:
        file: ./secrets/redis_kong_password.txt

services:
    # ================================================================================
    # PostgreSQL 16 — Banco compartilhado para Kong + Keycloak (schemas separados)
    # ================================================================================
    postgresql:
        image: postgres:16
        container_name: vibranium-postgresql
        restart: unless-stopped

        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 1024M
                reservations:
                    cpus: '0.5'
                    memory: 512M

        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
            POSTGRES_DB: vibranium_infra

        secrets:
            - postgres_password

        # Porta 5432 NÃO exposta ao host intencionalmente:
        # Kong e Keycloak acessam via rede Docker interna (hostname: postgresql).
        # Para acesso direto: docker exec -it vibranium-postgresql psql -U postgres -d vibranium_infra
        # ports:
        #   - '5432:5432'

        volumes:
            # Script de inicialização da infra (schemas Kong e Keycloak)
            - ./postgres/init-infra-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
            - postgresql_data:/var/lib/postgresql/data
            - postgresql_logs:/var/log/postgresql

        networks:
            - vibranium-infra

        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d vibranium_infra && psql -U postgres -d vibranium_infra -c "SELECT 1" >/dev/null 2>&1']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

        logging:
            driver: 'json-file'
            options:
                max-size: '100m'
                max-file: '10'
                labels: 'service=postgresql'

    # ================================================================================
    # Kong 3.4 — API Gateway (modo database com PostgreSQL)
    # ================================================================================
    kong-db-migration:
        image: kong:3.4
        container_name: vibranium-kong-migration
        restart: 'no'

        environment:
            KONG_DATABASE: postgres
            KONG_PG_HOST: postgresql
            KONG_PG_PORT: 5432
            KONG_PG_USER: postgres
            KONG_PG_PASSWORD_FILE: /run/secrets/postgres_password
            KONG_PG_DATABASE: vibranium_infra

        secrets:
            - postgres_password

        depends_on:
            postgresql:
                condition: service_healthy

        networks:
            - vibranium-infra

        command: kong migrations bootstrap

        logging:
            driver: 'json-file'
            options:
                max-size: '50m'
                max-file: '5'
                labels: 'service=kong-migration'

    kong:
        image: kong:3.4
        container_name: vibranium-kong
        restart: unless-stopped

        deploy:
            resources:
                limits:
                    cpus: '0.75'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M

        environment:
            KONG_DATABASE: postgres
            KONG_PG_HOST: postgresql
            KONG_PG_PORT: 5432
            KONG_PG_USER: postgres
            KONG_PG_PASSWORD_FILE: /run/secrets/postgres_password
            KONG_PG_DATABASE: vibranium_infra
            KONG_ADMIN_LISTEN: 0.0.0.0:8001
            KONG_ADMIN_GUI_LISTEN: 0.0.0.0:8002
            KONG_PROXY_LISTEN: 0.0.0.0:8000
            KONG_PROXY_UI_LISTEN: 0.0.0.0:8002
            KONG_LOG_LEVEL: warn
            KONG_UPSTREAM_KEEPALIVE: '60'
            KONG_UPSTREAM_KEEPALIVE_REQUESTS: '100'
            KONG_UPSTREAM_KEEPALIVE_TIMEOUT: '60'

        secrets:
            - postgres_password

        ports:
            - '8000:8000'
            - '127.0.0.1:8001:8001'
            - '127.0.0.1:8002:8002'

        volumes:
            - kong_data:/usr/local/kong/data
            - kong_cache:/usr/local/kong/.cache

        depends_on:
            postgresql:
                condition: service_healthy
            kong-db-migration:
                condition: service_completed_successfully

        networks:
            - vibranium-infra

        healthcheck:
            test: ['CMD-SHELL', 'kong health 2>/dev/null | grep -q "Kong is healthy"']
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s

        logging:
            driver: 'json-file'
            options:
                max-size: '100m'
                max-file: '10'
                labels: 'service=kong'

    # ================================================================================
    # RabbitMQ 3.13 — Message broker (necessário para o plugin Keycloak→RabbitMQ)
    # ================================================================================
    rabbitmq:
        image: rabbitmq:3.13-management-alpine
        container_name: vibranium-rabbitmq
        restart: unless-stopped

        deploy:
            resources:
                limits:
                    cpus: '0.5'
                    memory: 512M
                reservations:
                    cpus: '0.25'
                    memory: 256M

        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}

        secrets:
            - rabbitmq_password

        ports:
            - '5672:5672'
            - '15672:15672'

        volumes:
            - rabbitmq_data:/var/lib/rabbitmq

        networks:
            - vibranium-infra

        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5

        logging:
            driver: 'json-file'
            options:
                max-size: '50m'
                max-file: '5'
                labels: 'service=rabbitmq'

    # ================================================================================
    # Keycloak 22 — Authentication & Authorization
    # Imagem customizada com plugin keycloak-event-listener-rabbitmq.
    # Ref: https://github.com/aznamier/keycloak-event-listener-rabbitmq
    # ================================================================================
    keycloak:
        build:
            # Build context = infra/ (diretório deste compose file)
            context: .
            dockerfile: docker/Dockerfile.keycloak
        image: vibranium-keycloak:22.0.5
        container_name: vibranium-keycloak
        restart: unless-stopped

        deploy:
            resources:
                limits:
                    cpus: '1.0'
                    memory: 1024M
                reservations:
                    cpus: '0.5'
                    memory: 512M

        entrypoint:
            - /bin/sh
            - /opt/keycloak/data/configure-admin-token.sh
        command:
            - start-dev
            - --import-realm

        environment:
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://postgresql:5432/vibranium_infra
            KC_DB_USERNAME: postgres
            KC_DB_PASSWORD_FILE: /run/secrets/postgres_password
            KC_DB_SCHEMA: keycloak
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
            KC_BOOTSTRAP_ADMIN_USERNAME: admin
            KC_BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin_password
            KC_HTTP_ENABLED: 'true'
            KC_HTTP_PORT: 8080
            KC_HOSTNAME_STRICT: 'false'
            KC_PROXY: edge
            KC_PROXY_HEADERS: xforwarded
            KC_HEALTH_ENABLED: 'true'
            KC_METRICS_ENABLED: 'true'
            KC_LOG_LEVEL: INFO
            KC_CACHE: local
            # Plugin keycloak-event-listener-rabbitmq
            KK_TO_RMQ_URL: rabbitmq
            KK_TO_RMQ_PORT: 5672
            KK_TO_RMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
            KK_TO_RMQ_PASSWORD_FILE: /run/secrets/rabbitmq_password
            KK_TO_RMQ_VHOST: /
            KK_TO_RMQ_EXCHANGE: amq.topic
            KK_TO_RMQ_USE_TLS: 'false'

        secrets:
            - postgres_password
            - keycloak_admin_password
            - rabbitmq_password

        ports:
            - '8080:8080'

        volumes:
            - keycloak_data:/opt/keycloak/data
            - ./keycloak/configure-admin-token.sh:/opt/keycloak/data/configure-admin-token.sh:ro
            # Realm importado automaticamente via --import-realm
            - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro

        depends_on:
            postgresql:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy

        networks:
            - vibranium-infra

        healthcheck:
            test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/live HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200 OK" <&3']
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 60s

        logging:
            driver: 'json-file'
            options:
                max-size: '100m'
                max-file: '10'
                labels: 'service=keycloak'

    # ================================================================================
    # Redis-Kong — Redis dedicado para rate-limiting distribuído do Kong
    #
    # Isolado do Redis de aplicação: usa db=1 para namespacing.
    # Sem porta pública: acessível apenas internamente via vibranium-infra.
    # appendonly=no: contadores de rate-limiting são voláteis por design —
    #   uma reinicialização zera os contadores (comportamento aceitável e seguro).
    # ================================================================================
    redis-kong:
        image: redis:7-alpine
        container_name: vibranium-redis-kong
        restart: unless-stopped

        deploy:
            resources:
                limits:
                    cpus: '0.25'
                    memory: 64M
                reservations:
                    cpus: '0.10'
                    memory: 32M

        # requirepass via Docker Secret — senha dedicada ao Redis do Kong (diferente do app).
        # appendonly=no: contadores de rate-limiting não precisam de persistência.
        entrypoint: ['sh', '-c', 'redis-server --appendonly no --save "" --requirepass "$$(cat /run/secrets/redis_kong_password)"']

        secrets:
            - redis_kong_password

        # Porta NÃO exposta ao host intencionalmente.
        # Kong acessa via hostname redis-kong na rede Docker interna.
        networks:
            - vibranium-infra

        healthcheck:
            test: ['CMD', 'redis-cli', '-a', '${REDIS_KONG_PASSWORD}', 'ping']
            interval: 10s
            timeout: 3s
            retries: 5
            start_period: 10s

        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
                labels: 'service=redis-kong'

    # ================================================================================
    # Kong-init — Provisiona Service, Route e Plugins no Kong via Admin API
    # Script kong-setup.sh:
    #   1. Cria services order-service e wallet-service
    #   2. Cria routes e plugins (jwt RS256, rate-limiting, cors)
    #   3. Busca JWKS do Keycloak e registra credencial RSA no consumer
    # ================================================================================
    kong-init:
        build:
            # Build context = infra/ para acessar kong/kong-setup.sh e docker/Dockerfile.kong-init
            context: .
            dockerfile: docker/Dockerfile.kong-init
        container_name: vibranium-kong-init
        restart: 'no'

        environment:
            KONG_ADMIN_URL: http://kong:8001
            KEYCLOAK_URL: http://keycloak:8080
            KEYCLOAK_REALM: orderbook-realm
            KONG_CONSUMER_NAME: keycloak-realm-consumer
            KEYCLOAK_ISSUER: http://localhost:8080/realms/orderbook-realm
            REDIS_KONG_PASSWORD_FILE: /run/secrets/redis_kong_password

        secrets:
            - redis_kong_password

        depends_on:
            kong:
                condition: service_healthy
            keycloak:
                condition: service_healthy
            redis-kong:
                condition: service_healthy

        networks:
            - vibranium-infra

        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
                labels: 'service=kong-init'

    # ================================================================================
    # jwks-rotator — Sidecar de rotação automática de JWKS (AT-13.1)
    #
    # Problema resolvido:
    #   Quando o Keycloak rota a chave RSA (novo kid), o Kong ainda possui a chave
    #   antiga → todos os tokens novos retornam 401. Incidente P1 em produção.
    #
    # Solução:
    #   Container de longa duração que verifica o JWKS a cada 6 horas (ROTATION_INTERVAL).
    #   Se o kid mudou, atualiza a credencial JWT do consumer via Kong Admin API.
    #   Sem reinicialização do Kong, sem downtime, sem intervenção manual.
    #
    # Idempotência:
    #   - Se kid não mudou → no-op (zero chamadas à Admin API)
    #   - Se kid mudou → remove credencial antiga + registra nova
    #   - State file em volume persistente: /var/lib/jwks-rotator/last_kid
    #
    # Em Kubernetes equivaleria a:
    #   apiVersion: batch/v1
    #   kind: CronJob
    #   spec:
    #     schedule: "0 */6 * * *"
    # ================================================================================
    jwks-rotator:
        build:
            # Build context = infra/ (Dockerfile.jwks-rotator está em infra/docker/)
            context: .
            dockerfile: docker/Dockerfile.jwks-rotator
        image: vibranium-jwks-rotator:latest
        container_name: vibranium-jwks-rotator
        restart: unless-stopped

        deploy:
            resources:
                limits:
                    cpus: '0.10'
                    memory: 32M
                reservations:
                    cpus: '0.05'
                    memory: 16M

        environment:
            # URLs internas da rede Docker
            KONG_ADMIN_URL: http://kong:8001
            KEYCLOAK_URL: http://keycloak:8080
            KEYCLOAK_REALM: orderbook-realm
            KONG_CONSUMER_NAME: keycloak-realm-consumer
            # KEYCLOAK_ISSUER deve corresponder ao claim `iss` dos tokens (URL do cliente)
            KEYCLOAK_ISSUER: http://localhost:8080/realms/orderbook-realm
            KID_STATE_FILE: /var/lib/jwks-rotator/last_kid
            # Intervalo de verificação: 21600s = 6 horas
            # Trade-off: menor intervalo = mais atualizado, mais chamadas API
            # 6 horas: conservador, mantendo janela de vulnerabilidade aceitável
            ROTATION_INTERVAL: '21600'

        volumes:
            # Volume persistente para o state file (kid do último sync)
            # Sem este volume, cada restart forcça uma re-sincronização (aceitável mas desnecessario)
            - jwks_rotator_state:/var/lib/jwks-rotator

        depends_on:
            kong:
                condition: service_healthy
            keycloak:
                condition: service_healthy

        networks:
            - vibranium-infra

        healthcheck:
            # Verifica que o state file foi criado (indica que pelo menos um sync ocorreu)
            test: ['CMD-SHELL', 'test -f /var/lib/jwks-rotator/last_kid || exit 1']
            interval: 30s
            timeout: 5s
            retries: 10
            start_period: 60s

        logging:
            driver: 'json-file'
            options:
                max-size: '50m'
                max-file: '5'
                labels: 'service=jwks-rotator'

networks:
    vibranium-infra:
        driver: bridge

volumes:
    postgresql_data:
        driver: local
        labels:
            description: 'Dados persistidos do PostgreSQL 16 (infra: Kong + Keycloak)'
    postgresql_logs:
        driver: local
        labels:
            description: 'Logs do PostgreSQL 16'
    kong_data:
        driver: local
        labels:
            description: 'Configurações e plugins do Kong'
    kong_cache:
        driver: local
        labels:
            description: 'Cache e sessões do Kong'
    keycloak_data:
        driver: local
        labels:
            description: 'Realms, usuários e configurações do Keycloak'
    rabbitmq_data:
        driver: local
        labels:
            description: 'Dados do RabbitMQ (filas, exchanges, mensagens)'
    jwks_rotator_state:
        driver: local
        labels:
            description: 'State file do jwks-rotator: persiste o kid do último sync JWKS→Kong'
