# ================================================================================
# Prometheus Configuration — Vibranium Platform (performance testing)
# ================================================================================
# Coleta métricas dos microsserviços Spring Boot via /actuator/prometheus.
# Scrape interval padrão: 15s (adequado para testes de performance, ajustar para 30s em produção).
# ================================================================================

global:
    scrape_interval: 15s
    evaluation_interval: 15s
    scrape_timeout: 10s

scrape_configs:
    # --------------------------------------------------------------------------
    # Prometheus self-monitoring
    # --------------------------------------------------------------------------
    - job_name: 'prometheus'
      static_configs:
          - targets: ['localhost:9090']

    - job_name: 'order-service'
      metrics_path: '/actuator/prometheus'
      static_configs:
          - targets: ['order-service-1:8080', 'order-service-2:8080']
            labels:
                application: 'order-service'

    - job_name: 'wallet-service'
      metrics_path: '/actuator/prometheus'
      static_configs:
          - targets: ['wallet-service-1:8081', 'wallet-service-2:8081']
            labels:
                application: 'wallet-service'