version: '3.8'

services:
    order-service:
        image: vibranium-order-service:latest
        container_name: vibranium-order-service
        ports:
            - '8080:8080'
        environment:
            SERVER_PORT: 8080
            SPRING_APPLICATION_NAME: order-service
        healthcheck:
            test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/actuator/health']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s
        networks:
            - vibranium-network

    wallet-service:
        image: vibranium-wallet-service:latest
        container_name: vibranium-wallet-service
        ports:
            - '8081:8081'
        environment:
            SERVER_PORT: 8081
            SPRING_APPLICATION_NAME: wallet-service
        healthcheck:
            test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8081/actuator/health']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 30s
        networks:
            - vibranium-network

networks:
    vibranium-network:
        driver: bridge
