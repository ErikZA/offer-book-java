version: '3.8'

services:
    # PostgreSQL - Database
    postgresql:
        image: postgres:16
        container_name: vibranium-postgresql
        restart: unless-stopped
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres123
            POSTGRES_DB: vibranium_infra
        ports:
            - '5432:5432'
        volumes:
            - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
            - postgresql_data:/var/lib/postgresql/data
        networks:
            - vibranium-infra
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d vibranium_infra']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s

volumes:
    postgresql_data:

networks:
    vibranium-infra:
        driver: bridge
