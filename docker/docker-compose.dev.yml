version: '3.8'

services:
    # ================== Shared Infrastructure ==================

    mongodb:
        image: mongo:7.0
        container_name: vibranium-mongodb
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: admin123
            MONGO_INITDB_DATABASE: vibranium_orders
        volumes:
            - mongodb_data:/data/db
        networks:
            - vibranium-network-dev
        healthcheck:
            test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test -u admin -p admin123
            interval: 10s
            timeout: 5s
            retries: 5

    postgres:
        image: postgres:16-alpine
        container_name: vibranium-postgres
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            # Banco padrão criado pelo entrypoint (vibranium_wallet).
            # vibranium_orders é criado pelo 00-init-orders.sh antes do Flyway do order-service.
            POSTGRES_DB: vibranium_wallet
        volumes:
            - postgres_data:/var/lib/postgresql/data
            # 00 — cria vibranium_orders e habilita extensões (roda antes do 01)
            - ../apps/order-service/docker/init-orders-db.sh:/docker-entrypoint-initdb.d/00-init-orders.sh:ro
            # 01 — habilita extensões no vibranium_wallet (wallet-service)
            - ../apps/wallet-service/docker/init-wallet-db.sql:/docker-entrypoint-initdb.d/01-init-wallet.sql:ro
        networks:
            - vibranium-network-dev
        healthcheck:
            # Valida AMBOS os bancos de aplicação:
            #   vibranium_wallet  → wallet-service (Flyway)
            #   vibranium_orders  → order-service  (Flyway, criado pelo 00-init-orders.sh)
            # Garante que nenhum serviço sobe antes dos BDs estarem prontos.
            test:
                - 'CMD-SHELL'
                - >-
                    pg_isready -U postgres -d vibranium_wallet &&
                    psql -U postgres -d vibranium_wallet -c "SELECT 1" -q --no-align --tuples-only &&
                    psql -U postgres -d vibranium_orders -c "SELECT 1" -q --no-align --tuples-only
            interval: 5s
            timeout: 5s
            retries: 12
            start_period: 15s

    redis:
        image: redis:7-alpine
        container_name: vibranium-redis
        ports:
            - '6379:6379'
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5

    rabbitmq:
        image: rabbitmq:3.13-management-alpine
        container_name: vibranium-rabbitmq
        ports:
            - '5672:5672'
            - '15672:15672'
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5

    # ================================================================================
    # Keycloak PostgreSQL - Banco dedicado para o Keycloak (dev)
    # ================================================================================
    keycloak-db:
        image: postgres:16-alpine
        container_name: vibranium-keycloak-db-dev
        environment:
            POSTGRES_USER: keycloak
            POSTGRES_PASSWORD: keycloak
            POSTGRES_DB: keycloak_db
        volumes:
            - keycloak_db_data:/var/lib/postgresql/data
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U keycloak -d keycloak_db']
            interval: 10s
            timeout: 5s
            retries: 5

    # ================================================================================
    # Keycloak 22 - Authentication & Authorization (dev)
    # Plugin keycloak-event-listener-rabbitmq publica eventos de auth no RabbitMQ.
    # Referência: https://github.com/aznamier/keycloak-event-listener-rabbitmq
    # ================================================================================
    keycloak:
        # Imagem customizada com o plugin JAR pré-instalado em /opt/keycloak/providers/
        build:
            context: ../infra
            dockerfile: docker/Dockerfile.keycloak
        image: vibranium-keycloak:22.0.5
        container_name: vibranium-keycloak-dev
        ports:
            - '8180:8080'
        # start-dev: modo desenvolvimento | --import-realm: importa JSONs de data/import/
        command:
            - start-dev
            - --import-realm
        environment:
            # Database configuration
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak_db
            KC_DB_USERNAME: keycloak
            KC_DB_PASSWORD: keycloak

            # Admin credentials
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: admin123

            # HTTP configuration
            KC_HTTP_ENABLED: 'true'
            KC_HTTP_PORT: 8080
            KC_HOSTNAME_STRICT: 'false'

            # Health & Metrics
            KC_HEALTH_ENABLED: 'true'
            KC_METRICS_ENABLED: 'true'

            KC_LOG_LEVEL: INFO
            KC_CACHE: local

            # ---------------------------------------------------------------
            # Plugin keycloak-event-listener-rabbitmq
            # ---------------------------------------------------------------
            KK_TO_RMQ_URL: rabbitmq
            KK_TO_RMQ_PORT: 5672
            KK_TO_RMQ_USERNAME: guest
            KK_TO_RMQ_PASSWORD: guest
            KK_TO_RMQ_VHOST: /
            KK_TO_RMQ_EXCHANGE: amq.topic
            KK_TO_RMQ_USE_TLS: 'false'
        volumes:
            - keycloak_dev_data:/opt/keycloak/data
            # Realm importado automaticamente na subida via --import-realm
            - ./realm-export.json:/opt/keycloak/data/import/realm.json:ro
        depends_on:
            keycloak-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/live HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200 OK" <&3']
            interval: 15s
            timeout: 10s
            retries: 10
            start_period: 60s

    # ================================================================================
    # Kong 3.4 - API Gateway (dev)
    # Modo DB-less (declarativo via kong-init.yml) para simplicidade no ambiente dev.
    # Em produção usar mode=postgres (docker-compose.yml).
    # Proxy: localhost:8000 | Admin API: localhost:8001
    # ================================================================================
    kong:
        image: kong:3.4
        container_name: vibranium-kong-dev
        environment:
            KONG_DATABASE: 'off'
            KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
            KONG_ADMIN_LISTEN: 0.0.0.0:8001
            KONG_PROXY_LISTEN: 0.0.0.0:8000
            KONG_LOG_LEVEL: warn
        ports:
            - '8000:8000' # Proxy (entrada pública)
            - '8001:8001' # Admin API (dev only)
        volumes:
            # Configuração declarativa com todos os serviços, rotas e plugins
            - ./kong-init.yml:/etc/kong/kong.yml:ro
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD-SHELL', 'curl -sf http://localhost:8001/status || exit 1']
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 20s

    # ================================================================================
    # Kong-init: provisiona JWT consumer com a chave pública do Keycloak (dev)
    # Roda após Kong e Keycloak estarem healthy — executa kong-setup.sh
    # ================================================================================
    kong-init:
        image: alpine:3.19
        container_name: vibranium-kong-init-dev
        environment:
            KONG_ADMIN_URL: http://kong:8001
            KEYCLOAK_URL: http://keycloak:8080
            KEYCLOAK_REALM: vibranium-realm
            KONG_CONSUMER_NAME: keycloak-realm-consumer
            KEYCLOAK_ISSUER: http://localhost:8180/realms/vibranium-realm
        volumes:
            - ./kong-setup.sh:/kong-setup.sh:ro
        command: ['sh', '/kong-setup.sh']
        depends_on:
            kong:
                condition: service_healthy
            keycloak:
                condition: service_healthy
        networks:
            - vibranium-network-dev

    # ================== Development Services with Hot Reload ==================

    order-service:
        build:
            context: ..
            dockerfile: apps/order-service/docker/Dockerfile.dev
        container_name: vibranium-order-service-dev
        ports:
            - '8080:8080'
            - '5005:5005'
        environment:
            SERVER_PORT: 8080
            SPRING_APPLICATION_NAME: order-service
            SPRING_PROFILES_ACTIVE: dev
            JAVA_OPTS: '-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005'
            # Sobrescreve application.yaml para o ambiente Docker.
            # BD dedicado ao order-service (evita shared-database anti-pattern).
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vibranium_orders
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            # RabbitMQ via container dev
            SPRING_RABBITMQ_HOST: rabbitmq
            SPRING_RABBITMQ_PORT: '5672'
        volumes:
            - ../apps/order-service:/app/apps/order-service
            - ../libs:/app/libs
            - ../pom.xml:/app/pom.xml
            - m2_cache:/root/.m2
        working_dir: /app
        command: mvn spring-boot:run -pl apps/order-service -Dspring-boot.run.fork=false
        depends_on:
            # Postgres deve estar HEALTHY (vibranium_orders criado) antes do Flyway rodar
            postgres:
                condition: service_healthy
            mongodb:
                condition: service_healthy
            redis:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            keycloak:
                condition: service_healthy
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/actuator/health']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 60s

    wallet-service:
        build:
            context: ..
            dockerfile: apps/wallet-service/docker/Dockerfile.dev
        container_name: vibranium-wallet-service-dev
        ports:
            - '8081:8081'
            - '5006:5006'
        environment:
            SERVER_PORT: 8081
            SPRING_APPLICATION_NAME: wallet-service
            SPRING_PROFILES_ACTIVE: dev
            JAVA_OPTS: '-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5006'
            # Sobrescreve as credenciais do application.yaml para o ambiente Docker.
            # O postgres do dev compose usa user/password simples (postgres/postgres).
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vibranium_wallet
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            # RabbitMQ via container dev (não o do infra compose)
            SPRING_RABBITMQ_HOST: rabbitmq
            SPRING_RABBITMQ_PORT: '5672'
        volumes:
            - ../apps/wallet-service:/app/apps/wallet-service
            - ../libs:/app/libs
            - ../pom.xml:/app/pom.xml
            - m2_cache:/root/.m2
        working_dir: /app
        command: mvn spring-boot:run -pl apps/wallet-service -Dspring-boot.run.fork=false
        depends_on:
            # Aguarda o postgres estar healthy (banco vibranium_wallet acessível)
            # antes de subir o wallet-service. O Flyway executa as migrations
            # no startup da aplicação Spring Boot.
            postgres:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
            keycloak:
                condition: service_healthy
        networks:
            - vibranium-network-dev
        healthcheck:
            test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8081/actuator/health']
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 60s

networks:
    vibranium-network-dev:
        driver: bridge

volumes:
    mongodb_data:
    postgres_data:
    redis_data:
    rabbitmq_data:
    keycloak_db_data:
    keycloak_dev_data:
    m2_cache:
