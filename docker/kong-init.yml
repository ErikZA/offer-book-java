# ==============================================================================
# Kong 3.4 — Configuração Declarativa (decK format v3.0)
# Aplicada pelo serviço `kong-init` via Admin API (http://kong:8001)
#
# Topologia:
#   order-service (upstream) → route POST /api/v1/orders
#     - Plugin jwt       : valida assinatura RS256 do Keycloak; key_claim_name=iss
#     - Plugin rate-limiting: 100 req/s por IP (policy=local para single-node)
#     - Plugin cors       : headers permissivos para dev
#
# NOTA DE SEGURANÇA:
#   Em produção, substituir `policy: local` por `policy: redis` no rate-limiting
#   e configurar `anonymous` consumer nulo para rejeitar tokens inválidos.
#
# A credencial RSA do plugin JWT (chave pública do Keycloak) é provisionada
# dinamicamente pelo script `kong-setup.sh` após o Keycloak estar disponível.
# ==============================================================================

_format_version: "3.0"
_transform: true

services:
    # ---------------------------------------------------------------------------
    # order-service: upstream do microsserviço Spring Boot na rede Docker interna
    # ---------------------------------------------------------------------------
    - name: order-service
      url: http://order-service:8080
      connect_timeout: 5000   # ms — falha rápida se o pod não responder
      read_timeout: 10000     # ms — tempo máximo de resposta do upstream
      write_timeout: 10000    # ms — tempo máximo de escrita
      retries: 0              # sem retry em operações de comando (não-idempotentes)

      routes:
          # -----------------------------------------------------------------------
          # Rota de Commands: aceita apenas requisições POST autenticadas
          # Qualquer outro método é rejeitado com 405 Method Not Allowed pelo Kong
          # -----------------------------------------------------------------------
          - name: place-order-route
            paths:
                - /api/v1/orders
            methods:
                - POST
                - OPTIONS       # necessário para preflight CORS
            strip_path: false   # preserva o path completo ao encaminhar ao upstream
            preserve_host: false

      plugins:
          # -----------------------------------------------------------------------
          # Plugin JWT (Kong CE): valida tokens RS256 emitidos pelo Keycloak
          #
          # Fluxo de validação:
          #   1. Extrai o token do header `Authorization: Bearer <token>`
          #   2. Usa o campo `iss` (key_claim_name) para localizar o consumer
          #      e sua credencial RSA associada (provisionada pelo kong-setup.sh)
          #   3. Verifica assinatura RS256 com a chave pública do Keycloak
          #   4. Verifica claim `exp` (expiração)
          #
          # IMPORTANTE: o campo `key` da credencial JWT do consumer deve ser
          # idêntico ao valor de `iss` no JWT emitido pelo Keycloak.
          # Ex: "http://localhost:8080/realms/orderbook-realm"
          # -----------------------------------------------------------------------
          - name: jwt
            config:
                uri_param_names: []        # não aceitar JWT via query param (segurança)
                cookie_names: []           # não aceitar JWT via cookie
                header_names:
                    - Authorization        # padrão Bearer token
                claims_to_verify:
                    - exp                  # rejeita tokens expirados
                key_claim_name: iss        # mapeia consumer pelo campo `iss` do payload
                maximum_expiration: 3600   # rejeita tokens com expiração > 1h no futuro
                secret_is_base64: false    # chave RSA em formato PEM, não base64
                run_on_preflight: false    # permite OPTIONS sem token (CORS preflight)

          # -----------------------------------------------------------------------
          # Plugin Rate-Limiting: 100 req/s por IP para proteger o upstream
          #
          # Limites:
          #   second: 100 req/s — limite de burst por IP
          #   minute: 5000      — janela de 1 minuto para uso sustentado
          #
          # Em produção com múltiplos nós Kong, usar `policy: redis` com o
          # cluster Redis compartilhado para contagem centralizada.
          # -----------------------------------------------------------------------
          - name: rate-limiting
            config:
                second: 100
                minute: 5000
                policy: local          # single-node; use redis em produção
                limit_by: ip
                hide_client_headers: false  # expõe X-RateLimit-* headers ao cliente
                fault_tolerant: true        # não bloqueia requisições se o rate-limiter falhar

          # -----------------------------------------------------------------------
          # Plugin CORS: permissivo para ambiente de desenvolvimento
          # Em produção, restringir `origins` ao domínio do frontend
          # -----------------------------------------------------------------------
          - name: cors
            config:
                origins:
                    - "*"
                methods:
                    - GET
                    - POST
                    - OPTIONS
                headers:
                    - Accept
                    - Authorization
                    - Content-Type
                    - X-Requested-With
                    - X-Correlation-ID
                exposed_headers:
                    - X-Auth-Token
                    - X-Correlation-ID
                credentials: false          # false quando origins = "*"
                max_age: 3600
                preflight_continue: false   # Kong responde ao preflight, não encaminha
