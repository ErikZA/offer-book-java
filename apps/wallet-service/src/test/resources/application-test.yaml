spring:
    jpa:
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
    flyway:
        enabled: true
        locations: classpath:db/migration

    rabbitmq:
        listener:
            simple:
                acknowledge-mode: manual
                prefetch: 1
                default-requeue-rejected: false

logging:
    level:
        root: WARN
        com.vibranium: DEBUG
        org.testcontainers: INFO
