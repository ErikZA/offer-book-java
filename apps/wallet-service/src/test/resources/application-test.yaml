spring:
    jpa:
        hibernate:
            ddl-auto: validate
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
    flyway:
        enabled: true
        locations: classpath:db/migration

    rabbitmq:
        listener:
            simple:
                acknowledge-mode: manual
                prefetch: 1
                default-requeue-rejected: false

    # ---------------------------------------------------------------------------
    # AT-10.1: Segurança — perfil de testes
    # ---------------------------------------------------------------------------
    # jwk-set-uri é LAZY: o JwtDecoder não contacta o endpoint no startup.
    # Como os testes de integração usam @WithMockUser (via AbstractIntegrationTest),
    # nenhuma validação JWT real ocorre — a URL abaixo nunca é acessada.
    # Isso evita que testes falhem por ausência do Keycloak no ambiente CI.
    #
    # Diferença entre as propriedades:
    #   issuer-uri  → faz OIDC Discovery em startup (HTTP síncrono obrigatório).
    #   jwk-set-uri → lazy, contactado apenas ao validar um Bearer Token real.
    security:
        oauth2:
            resourceserver:
                jwt:
                    jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:9999/.well-known/jwks.json}

# ---------------------------------------------------------------------------
# Outbox Publisher — configuração de teste (Debezium desligado por padrão)
# Ativado individualmente em OutboxPublisherIntegrationTest via @TestPropertySource
# ---------------------------------------------------------------------------
app:
    outbox:
        batch-size: 100
        debezium:
            enabled: false

            # Host/port sobrescritos pelo @DynamicPropertySource do AbstractIntegrationTest
            db-host: localhost
            db-port: 5432
            db-name: vibranium_wallet_test
            db-user: test
            db-password: test

            # Slot exclusivo para testes — dropado ao parar o engine
            slot-name: wallet_outbox_test

            # MemoryOffsetBackingStore: sem persistência de offset entre testes.
            # Cada reinício do engine começa do WAL atual (combinado com snapshot.mode=never).
            # AT-08.1: testes usam Memory; produção usa JdbcOffsetBackingStore (application.yaml).
            # Propriedades offset-storage-jdbc-* são ignoradas com MemoryOffsetBackingStore.
            offset-storage: org.apache.kafka.connect.storage.MemoryOffsetBackingStore

            # Dropa o slot ao parar o engine de teste para não acumular slots inativos
            drop-slot-on-stop: true

logging:
    level:
        root: WARN
        com.vibranium: DEBUG
        org.testcontainers: INFO
