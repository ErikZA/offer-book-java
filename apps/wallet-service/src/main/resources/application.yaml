spring:
    application:
        name: wallet-service
    profiles:
        active: dev

    # PostgreSQL
    # Credenciais via variáveis de ambiente com fallback para desenvolvimento local.
    # - Rodando direto na IDE (sem Docker): conecta ao infra postgres (porta 5432, senha postgres123)
    # - Rodando via docker-compose.dev.yml: o compose injeta SPRING_DATASOURCE_PASSWORD=postgres
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vibranium_wallet}
        username: ${SPRING_DATASOURCE_USERNAME:postgres}
        password: ${SPRING_DATASOURCE_PASSWORD:postgres123}
        driver-class-name: org.postgresql.Driver

    jpa:
        hibernate:
            # validate: Hibernate verifica que as entidades batem com o schema criado pelo Flyway.
            # Nunca use create/update em produção — o schema é versionado via migrations.
            ddl-auto: validate
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                jdbc:
                    batch_size: 20
                order_inserts: true
                order_updates: true

    # Flyway — gerencia o versionamento do schema do banco de dados.
    # As migrations em classpath:db/migration são executadas na ordem V1, V2, V3...
    # antes do Hibernate validar as entidades. Garante que o banco está sempre atualizado.
    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: false
        validate-on-migrate: true
        out-of-order: false

    # RabbitMQ
    rabbitmq:
        host: ${SPRING_RABBITMQ_HOST:localhost}
        port: ${SPRING_RABBITMQ_PORT:5672}
        username: ${SPRING_RABBITMQ_USERNAME:guest}
        password: ${SPRING_RABBITMQ_PASSWORD:guest}
        listener:
            simple:
                acknowledge-mode: manual
                prefetch: 1
                default-requeue-rejected: false

    # ---------------------------------------------------------------------------
    # AT-10.1: Spring Security — OAuth2 Resource Server
    # ---------------------------------------------------------------------------
    # Defense-in-depth: valida JWT independentemente do Kong.
    # O issuer-uri aciona OIDC Discovery automático em startup:
    #   GET ${issuer-uri}/.well-known/openid-configuration
    # O JwtDecoder usa o JWKS endpoint descoberto para validar assinaturas RS256.
    # KEYCLOAK_ISSUER_URI = http://keycloak:8080/realms/orderbook-realm (docker-compose)
    #
    # Fallback local: apenas para que a avaliação de condições do Spring não falhe
    # quando KEYCLOAK_ISSUER_URI não está definida (IDE local sem Docker).
    # Em testes (@WebMvcTest), jwk-set-uri do @TestPropertySource toma precedência —
    # o decoder de issuer-uri é ignorado via @ConditionalOnMissingBean(JwtDecoder.class).
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: ${KEYCLOAK_ISSUER_URI:http://keycloak:8080/realms/orderbook-realm}

server:
    port: 8081

# ---------------------------------------------------------------------------
# Outbox Publisher — configuração do relay via Debezium CDC
# ---------------------------------------------------------------------------
app:
    outbox:
        # Tamanho máximo do lote para o overload com Pageable (fallback)
        batch-size: 100

        debezium:
            # =========================================================================
            # ⚠️  RESTRIÇÃO ARQUITETURAL — SINGLE-INSTANCE ONLY (ADR-001 / AT-08.2)
            # =========================================================================
            # O Debezium Embedded NÃO suporta deployment multi-instance.
            #
            # Motivo técnico: o engine cria 1 replication slot por instância no
            # PostgreSQL e não possui coordenação distribuída (sem leader election,
            # sem cluster awareness). Com múltiplas instâncias:
            #
            #   Cenário A — mesmo slot (padrão):
            #     PostgreSQL rejeita a 2ª conexão com:
            #     "ERROR: replication slot wallet_outbox_slot is already active"
            #     (SQLState 55006). A instância entra em loop de retry.
            #
            #   Cenário B — slots distintos por instância (fan-out):
            #     O PostgreSQL retém o WAL até que TODOS os slots confirmem o LSN.
            #     Uma instância lenta ou travada causa WAL bloat ilimitado, podendo
            #     esgotar o disco e derrubar o banco de dados inteiro.
            #
            # REGRA: replicas: 1 obrigatório em qualquer orquestrador (Docker Compose,
            #        Kubernetes Deployment/StatefulSet) enquanto este componente estiver ativo.
            #
            # Para escala horizontal, desabilite o Debezium (enabled: false) e use o
            # Polling Scheduler com SELECT FOR UPDATE SKIP LOCKED, ou migre para
            # Debezium Server externo + Kafka (ver ADR-001).
            #
            # Referências:
            #   - docs/architecture/adr-001-debezium-single-instance.md
            #   - DebeziumSingleInstanceConstraintTest (AT-08.2)
            #   - https://debezium.io/documentation/reference/stable/development/engine.html
            # =========================================================================

            # Desligado por padrão; ativar explicitamente em cada ambiente
            enabled: ${APP_OUTBOX_DEBEZIUM_ENABLED:false}

            # Conexão com o PostgreSQL para o slot de replicação lógica.
            # Deve apontar para o mesmo banco da datasource principal.
            # Usuário deve ter a role REPLICATION (ou ser SUPERUSER).
            db-host: ${SPRING_DATASOURCE_HOST:localhost}
            db-port: ${SPRING_DATASOURCE_PORT:5432}
            db-name: ${SPRING_DATASOURCE_DBNAME:vibranium_wallet}
            db-user: ${SPRING_DATASOURCE_USERNAME:postgres}
            db-password: ${SPRING_DATASOURCE_PASSWORD:postgres123}

            # Nome do slot de replicação lógica no PostgreSQL.
            # ⚠️  Deve ser ÚNICO no cluster PostgreSQL — não configure dois slots com o
            # mesmo nome em instâncias distintas (banco rejeita a 2ª conexão).
            # ⚠️  NÃO use slots distintos por instância para fan-out: o PostgreSQL retém
            # o WAL até que TODOS os slots confirmem o LSN, causando WAL bloat ilimitado
            # se qualquer instância ficar lenta ou travada (ver ADR-001).
            # REGRA: este serviço deve rodar com replicas: 1 enquanto Debezium estiver ativo.
            slot-name: ${APP_OUTBOX_SLOT_NAME:wallet_outbox_slot}

            # AT-08.1: JdbcOffsetBackingStore — offset persistido no banco PostgreSQL.
            # Substitui FileOffsetBackingStore (/tmp efêmero, não persiste em containers)
            # para garantir continuidade exata do WAL após restart sem duplicatas.
            # Tabela criada pela migration V5__create_wallet_outbox_offset.sql (Flyway).
            offset-storage: io.debezium.storage.jdbc.offset.JdbcOffsetBackingStore
            offset-storage-jdbc-url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vibranium_wallet}
            offset-storage-jdbc-username: ${SPRING_DATASOURCE_USERNAME:postgres}
            offset-storage-jdbc-password: ${SPRING_DATASOURCE_PASSWORD:postgres123}
            offset-storage-jdbc-table-name: wallet_outbox_offset

            # Não dropa o slot ao parar em produção — preserva posição do WAL
            drop-slot-on-stop: false

logging:
    level:
        root: INFO
        com.vibranium: DEBUG

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics
    endpoint:
        health:
            show-details: always
