spring:
    application:
        name: order-service
    profiles:
        active: dev

    # -----------------------------------------------------------------------
    # Virtual Threads (Java 21) — descomenta em produção;
    # substitui o pool de threads do Tomcat e do SimpleAsyncTaskExecutor
    # por Virtual Threads do Project Loom para suportar 5000 req/s sem tunning manual.
    # -----------------------------------------------------------------------
    threads:
        virtual:
            enabled: true

    # -----------------------------------------------------------------------
    # PostgreSQL — banco dedicado do order-service (Command Side)
    # Armazena: tb_user_registry, tb_orders
    # BD isolado: cada serviço tem seu próprio banco (shared-database anti-pattern evitado)
    # -----------------------------------------------------------------------
    datasource:
        url: jdbc:postgresql://localhost:5432/vibranium_orders
        username: postgres
        password: postgres
        driver-class-name: org.postgresql.Driver
        hikari:
            maximum-pool-size: 30
            minimum-idle: 10
            connection-timeout: 5000
            idle-timeout: 600000
            # BUG-04: Detecta conexões não devolvidas ao pool após 30s — indica leak no código.
            leak-detection-threshold: 30000

    # -----------------------------------------------------------------------
    # JPA — Hibernate 6 com PostgreSQL dialect
    # ddl-auto: validate — Flyway é o responsável pelo DDL, não o Hibernate
    # -----------------------------------------------------------------------
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.PostgreSQLDialect
                format_sql: true
                jdbc:
                    time_zone: UTC

    # -----------------------------------------------------------------------
    # Flyway — migrations automáticas em classpath:/db/migration/
    # V1__create_user_registry.sql, V2__create_orders.sql
    # -----------------------------------------------------------------------
    flyway:
        enabled: true
        locations: classpath:db/migration
        baseline-on-migrate: false

    # -----------------------------------------------------------------------
    # MongoDB — Event Store (Read Model / Event Sourcing)
    # Somente para eventos persistidos via publicação assíncrona
    # -----------------------------------------------------------------------
    data:
        mongodb:
            # replicaSet=rs0: obrigatório para MongoTransactionManager criar sessões de transação.
            # Em dev local, inicie MongoDB com: mongod --replSet rs0 --bind_ip_all
            # Em Docker: gerenciado pelo serviço mongo-rs-init no docker-compose.dev.yml
            uri: mongodb://localhost:27017/vibranium_orders?replicaSet=rs0
            auto-index-creation: true

        # Redis — Motor de Match (Script Lua atômico via StringRedisTemplate)
        redis:
            host: localhost
            port: 6379
            password: ${REDIS_PASSWORD:}
            timeout: 2000ms
            lettuce:
                pool:
                    max-active: 8
                    max-idle: 4
                    min-idle: 1

    # -----------------------------------------------------------------------
    # RabbitMQ — Mensageria assíncrona inter-serviços
    # Exchanges e filas declaradas em RabbitMQConfig.java
    # -----------------------------------------------------------------------
    rabbitmq:
        host: localhost
        port: 5672
        username: guest
        password: guest
        template:
            # AT-14.1: habilita ObservationRegistry no RabbitTemplate (producer side).
            # Sem esta flag, o Spring AMQP NÃO injeta o header W3C 'traceparent' nas
            # mensagens mesmo com micrometer-tracing-bridge-otel no classpath.
            # Padrão: false (Spring AMQP 3.x). Requer sampling.probability > 0.
            observation-enabled: true
        listener:
            simple:
                # AT-14.1: habilita tracing no consumer side (propaga traceparent recebido).
                observation-enabled: true
                acknowledge-mode: manual # ACK manual para garantir processamento exato
                prefetch: 10 # controla throughput por consumer
                # AT-09: concurrency auto-escalável de 1 a 5 threads por instância.
                # Listeners com @RabbitListener(concurrency="5") sobrescrevem este default.
                # Filas de projeção (leitura idempotente) podem usar prefetch maior via factory.
                concurrency: 1
                max-concurrency: 5
                retry:
                    enabled: true
                    max-attempts: 3
                    initial-interval: 1000
                    multiplier: 2.0
                    max-interval: 10000

    # -----------------------------------------------------------------------
    # Spring Security — Resource Server: valida JWT RS256 do Keycloak
    # issuer-uri: usado para busca automática do OIDC discovery endpoint
    # -----------------------------------------------------------------------
    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:8080/realms/orderbook-realm

# -----------------------------------------------------------------------
# Application Queue/Exchange config (injetado via @ConfigurationProperties)
# -----------------------------------------------------------------------
app:
    # ---------------------------------------------------------------------------
    # Feature Flag: dependência do API Gateway (Kong)
    # ---------------------------------------------------------------------------
    # true  = ambiente de produção/staging: APIs esperam tráfego via Kong
    # false = testes de performance/dev: APIs aceitam chamadas diretas sem Gateway
    # Quando false, validações específicas do Gateway são ignoradas.
    gateway:
        enabled: ${APP_GATEWAY_ENABLED:true}

    # -----------------------------------------------------------------------
    # Outbox Publisher — Polling SKIP LOCKED (AT-01.1)
    # delay-ms: fixedDelay do @Scheduled (500ms = latência ~1s end-to-end por hop)
    # batch-size: LIMIT da query SELECT FOR UPDATE SKIP LOCKED
    # -----------------------------------------------------------------------
    outbox:
        delay-ms: 500
        batch-size: 100

    # -----------------------------------------------------------------------
    # Saga — Controle de timeout da Saga de reserva de fundos (AT-09.1)
    # pending-timeout-minutes: tempo máximo que uma ordem pode ficar em PENDING
    #                          antes de ser cancelada automaticamente
    # cleanup-delay-ms: intervalo de execução do SagaTimeoutCleanupJob (fixedDelay)
    # -----------------------------------------------------------------------
    saga:
        pending-timeout-minutes: 5
        cleanup-delay-ms: 60000

    # -----------------------------------------------------------------------
    # Projection Rebuild — Reconstrução do Read Model MongoDB (AT-08)
    # timeout-minutes: tempo máximo para o rebuild completo antes de abortar
    # incremental-cron: expressão cron para rebuild incremental automático
    #   "-" = desabilitado (padrão). Exemplo: "0 0 * * * *" = a cada hora.
    # -----------------------------------------------------------------------
    projection:
        rebuild:
            timeout-minutes: 30
            incremental-cron: '-'

    rabbitmq:
        exchanges:
            commands: vibranium.commands
            events: vibranium.events
            dlq: vibranium.dlq
        queues:
            reserve-funds: wallet.commands.reserve-funds
            funds-reserved: order.events.funds-reserved
            funds-failed: order.events.funds-failed
            match-executed: order.events.match-executed
            book-added: order.events.book-added
            keycloak-register: order.keycloak.user-register
            dead-letter: order.dead-letter
        routing-keys:
            reserve-funds: wallet.reserve-funds
            funds-reserved: wallet.funds.reserved
            funds-failed: wallet.funds.failed
            match-executed: order.match.executed
            book-added: order.book.added
            keycloak-register: 'KK.EVENT.CLIENT.orderbook-realm.REGISTER'
    redis:
        keys:
            # Hash tags {vibranium} garantem que asks, bids e order_index sejam calculados
            # sobre o mesmo slot CRC16 (apenas o conteúdo entre {} é usado no hash).
            # Sem hash tags: CRC16("vibranium:asks") ≠ CRC16("vibranium:bids") → slots diferentes
            # → CROSSSLOT em Redis Cluster ao executar script Lua multi-key com EVAL/EVALSHA.
            # Com hash tags: CRC16("vibranium") == CRC16("vibranium") → mesmo slot → OK.
            # Compatível com Redis standalone (hash tags são ignoradas em modo single-node).
            asks: '{vibranium}:asks'
            bids: '{vibranium}:bids'
            order-index: '{vibranium}:order_index'

# -----------------------------------------------------------------------
# AT-11 — Resilience4j: Circuit Breaker + Rate Limiter para o Motor de Match Redis.
# Protege contra cascata de falhas quando Redis fica indisponível.
# -----------------------------------------------------------------------
resilience4j:
    circuitbreaker:
        instances:
            redisMatchEngine:
                # Abre o circuito quando 50% das chamadas na janela falham.
                failure-rate-threshold: 50
                # Janela deslizante de 10 chamadas (COUNT_BASED).
                sliding-window-size: 10
                sliding-window-type: count_based
                # Número mínimo de chamadas antes de calcular a taxa de falha.
                minimum-number-of-calls: 5
                # Tempo que o circuito permanece OPEN antes de transitar para HALF_OPEN.
                wait-duration-in-open-state: 30s
                # Número de chamadas permitidas em HALF_OPEN para testar recuperação.
                permitted-number-of-calls-in-half-open-state: 3
                # Transição automática de OPEN → HALF_OPEN após waitDuration.
                automatic-transition-from-open-to-half-open-enabled: true
                # Apenas exceções de infraestrutura Redis disparam o circuit breaker.
                # Exceções de negócio (IllegalArgumentException, etc.) NÃO contam como falha.
                record-exceptions:
                    - org.springframework.data.redis.RedisConnectionFailureException
                    - org.springframework.data.redis.RedisSystemException
                    - io.lettuce.core.RedisConnectionException
                    - io.lettuce.core.RedisCommandTimeoutException
                    - org.springframework.dao.QueryTimeoutException
            # BUG-03: Circuit Breaker para PostgreSQL (HikariCP)
            postgresPool:
                failure-rate-threshold: 50
                sliding-window-size: 20
                sliding-window-type: count_based
                minimum-number-of-calls: 10
                wait-duration-in-open-state: 15s
                permitted-number-of-calls-in-half-open-state: 5
                automatic-transition-from-open-to-half-open-enabled: true
                record-exceptions:
                    - java.sql.SQLTransientConnectionException
                    - org.springframework.jdbc.CannotGetJdbcConnectionException
                    - org.springframework.dao.DataAccessResourceFailureException
            # BUG-03: Circuit Breaker para MongoDB
            mongoEventStore:
                failure-rate-threshold: 50
                sliding-window-size: 10
                sliding-window-type: count_based
                minimum-number-of-calls: 5
                wait-duration-in-open-state: 20s
                permitted-number-of-calls-in-half-open-state: 3
                automatic-transition-from-open-to-half-open-enabled: true
                record-exceptions:
                    - com.mongodb.MongoSocketException
                    - com.mongodb.MongoTimeoutException
                    - com.mongodb.MongoExecutionTimeoutException
                    - org.springframework.dao.DataAccessResourceFailureException
            # BUG-03: Circuit Breaker para RabbitMQ
            rabbitmqPublisher:
                failure-rate-threshold: 50
                sliding-window-size: 10
                sliding-window-type: count_based
                minimum-number-of-calls: 5
                wait-duration-in-open-state: 20s
                permitted-number-of-calls-in-half-open-state: 3
                automatic-transition-from-open-to-half-open-enabled: true
                record-exceptions:
                    - org.springframework.amqp.AmqpConnectException
                    - org.springframework.amqp.AmqpIOException
                    - org.springframework.amqp.AmqpResourceNotAvailableException
    # BUG-03: Bulkhead — isolamento de threads por recurso para evitar cascading failure.
    bulkhead:
        instances:
            redisMatchEngine:
                max-concurrent-calls: 50
                max-wait-duration: 200ms
            postgresPool:
                max-concurrent-calls: 30
                max-wait-duration: 500ms
            mongoEventStore:
                max-concurrent-calls: 20
                max-wait-duration: 300ms
            rabbitmqPublisher:
                max-concurrent-calls: 30
                max-wait-duration: 300ms
    ratelimiter:
        instances:
            redisMatchEngine:
                # Limita a 500 chamadas por segundo para proteger Redis de burst pós-recovery.
                limit-for-period: 500
                limit-refresh-period: 1s
                # Timeout máximo aguardando permissão do rate limiter.
                timeout-duration: 100ms

logging:
    level:
        root: INFO
        com.vibranium: DEBUG
        org.springframework.amqp: INFO
        org.springframework.security: WARN
    # AT-14.1: Inclui traceId e spanId no nível de cada log line.
    # O MDC (Mapped Diagnostic Context) é populado automaticamente pelo
    # Micrometer Tracing Bridge quando um span está ativo.
    #
    # AT-14.2: Adiciona correlationId e orderId ao padrão de log.
    # correlationId: propagado pelos listeners AMQP via MDC.putCloseable() — agrupa
    #   todas as linhas da Saga (placeOrder → FundsReserved → Match → Settlement).
    # orderId: identifica o agregado Order na linha de log.
    # Permite: grep correlationId=<uuid> → retorna toda a Saga nos logs.
    # Formato: LEVEL [app-name,traceId,spanId,correlationId,orderId] Class - mensagem
    # Exemplo: INFO [order-service,4bf92f3577b34da,00f067aa,-,corrId,ordId] ...
    pattern:
        level: '%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-},%X{correlationId:-},%X{orderId:-}]'

management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics,prometheus,circuitbreakers,circuitbreakerevents,ratelimiters,bulkheads
    endpoint:
        health:
            show-details: always
            # BUG-03: Liveness vs Readiness — Health Groups
            # Liveness: JVM está viva (ping, diskSpace) — se falhar, container deve ser reiniciado.
            # Readiness: aceita tráfego (db, redis, rabbit, mongo) — se falhar, não recebe tráfego.
            group:
                liveness:
                    include: ping,diskSpace
                readiness:
                    include: db,redis,rabbit,mongo
            probes:
                enabled: true
    # AT-14.1: Micrometer Tracing + OpenTelemetry
    # TRACING_ENABLED: controle global de tracing (default: true).
    # Em ambientes sem Jaeger/OTLP collector (ex: staging), setar TRACING_ENABLED=false
    # para evitar erros de conexão recusada no exporter.
    tracing:
        enabled: ${TRACING_ENABLED:true}
        sampling:
            # sampling.probability: 1.0 = exporta 100% dos spans em dev.
            # Em producão, reduzir para 0.1 (10%) ou usar tail-based sampling
            # no OpenTelemetry Collector para evitar overhead de I/O excessivo.
            probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
    # AT-14.1: Exportação OTLP para Jaeger.
    # OTEL_EXPORTER_OTLP_ENDPOINT: variável de ambiente injetada pelo docker-compose.dev.yml
    # Fallback: localhost:4318 para desenvolvimento local sem Docker.
    # O endpoint /v1/traces é o path-padrão do OTLP HTTP receiver do Jaeger.
    otlp:
        tracing:
            endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
