spring:
  application:
    name: order-service
  profiles:
    active: dev

  # MongoDB
  data:
    mongodb:
      uri: mongodb://localhost:27017/vibranium_orders
      auto-index-creation: true

  # Redis
  redis:
    host: localhost
    port: 6379
    timeout: 2000
    jedis:
      pool:
        max-active: 8

  # RabbitMQ
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

logging:
  level:
    root: INFO
    com.vibranium: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
