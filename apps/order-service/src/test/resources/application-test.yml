# ==============================================================================
# Configuração de testes de integração (profile=test)
# As propriedades de conexão (host, port, etc.) são SOBRESCRITAS via
# @DynamicPropertySource em AbstractIntegrationTest usando os containers
# Testcontainers. Este arquivo configura apenas o comportamento Spring.
# ==============================================================================

spring:
    # JPA: validar o schema (Flyway cria, Hibernate só valida)
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        properties:
            hibernate:
                format_sql: true

    # Flyway: aplica as migrations V1 e V2 no container Postgres de teste
    flyway:
        enabled: true
        locations: classpath:db/migration

    # Virtual Threads habilitados em testes também (simula produção)
    threads:
        virtual:
            enabled: true

    # Redis: senha configurada para testes (sobrescrita por @DynamicPropertySource)
    data:
        redis:
            password: testpass

    # RabbitMQ: configurações sobrescritas por @DynamicPropertySource
    rabbitmq:
        template:
            # AT-14.1: deve espelhar application.yaml para que TracingW3CPropagationIntegrationTest
            # encontre o ObservationRegistry vinculado ao RabbitTemplate no contexto de teste.
            observation-enabled: true
        listener:
            simple:
                observation-enabled: true
                acknowledge-mode: auto # AUTO em testes para simplificar setup
                prefetch: 10 # mesmo valor da produção; prefetch=1 limitaria throughput
                concurrency: 1
                max-concurrency: 5
        # O channel cache padrão é 25. Com testes de concorrência de 50 threads +
        # 50 virtual threads (projeção OrderReceivedEvent), o cache de 25 causa bloqueio.
        # Aumentamos para 100 para garantir que todos os requests SLA ≤ 200ms sejam atendidos.
        cache:
            channel:
                size: 100

    # Security: usa jwk-set-uri (lazy) em vez de issuer-uri (eager) para evitar
    # chamada HTTP ao Keycloak no startup. Os testes usam mockJwt() do
    # spring-security-test, que bypassa o JwtDecoder completamente.
    security:
        oauth2:
            resourceserver:
                jwt:
                    # jwk-set-uri é carregada LAZILY (apenas na 1ª validação real de JWT)
                    # Como testes usam SecurityMockMvcRequestPostProcessors.jwt(),
                    # o decoder nunca é invocado → sem chamada HTTP ao Keycloak
                    jwk-set-uri: http://localhost:9999/realms/test/protocol/openid-connect/certs

# Configuração de queues/exchanges espelhada do application.yaml
app:
    rabbitmq:
        exchanges:
            commands: vibranium.commands
            events: vibranium.events
            dlq: vibranium.dlq
        queues:
            reserve-funds: wallet.commands.reserve-funds
            funds-reserved: order.events.funds-reserved
            funds-failed: order.events.funds-failed
            match-executed: order.events.match-executed
            book-added: order.events.book-added
            keycloak-register: order.keycloak.user-register
            dead-letter: order.dead-letter
        routing-keys:
            reserve-funds: wallet.reserve-funds
            funds-reserved: wallet.funds.reserved
            funds-failed: wallet.funds.failed
            match-executed: order.match.executed
            book-added: order.book.added
            keycloak-register: 'KK.EVENT.CLIENT.orderbook-realm.REGISTER'
    redis:
        keys:
            # Espelha o formato de produção com hash tags {vibranium}.
            # Veja application.yaml para explicação completa sobre Redis Cluster e hash slots.
            asks: '{vibranium}:asks'
            bids: '{vibranium}:bids'
            order-index: '{vibranium}:order_index'
    # -----------------------------------------------------------------------
    # Saga timeout (AT-09.1): delay alto em testes para evitar execução automática
    # do SagaTimeoutCleanupJob enquanto outros testes de integração estão rodando.
    # Os testes do job invocam cancelStalePendingOrders() diretamente, sem esperar.
    # -----------------------------------------------------------------------
    saga:
        pending-timeout-minutes: 5
        cleanup-delay-ms: 3600000 # 1h — efetivamente desabilita execução automática em testes

logging:
    level:
        root: WARN
        com.vibranium: DEBUG
        org.testcontainers: INFO
        org.springframework.amqp: DEBUG
        org.springframework.security: DEBUG
