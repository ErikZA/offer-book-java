version: '3.8'

# ================================================================================
# AMBIENTE DE TESTES — Vibranium Platform
# ================================================================================
# Sobe toda a infra de testes isolada + test-runner com Maven.
# Todos os serviços usam sufixo -test e portas alternativas para não conflitar
# com ambientes dev/staging rodando em paralelo.
#
# Subir:    docker compose -f tests/docker-compose.test.yml up --abort-on-container-exit
# Limpar:   docker compose -f tests/docker-compose.test.yml down -v
#
# Relatórios de teste: tests/test-results/ (montado do host)
# ================================================================================

services:
    # ================================================================================
    # PostgreSQL 16 — Banco de infra para Kong e Keycloak (ambiente de teste)
    # Porta 5433 para não conflitar com dev (5432)
    # ================================================================================
    postgresql-test:
        image: postgres:16
        container_name: vibranium-postgresql-test
        ports:
            - '5433:5432'
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres123
            POSTGRES_DB: vibranium_infra_test
        volumes:
            - ../infra/postgres/init-infra-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
            - postgres_data_test:/var/lib/postgresql/data
        networks:
            - vibranium-network-test
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres -d vibranium_infra_test']
            interval: 5s
            timeout: 3s
            retries: 3
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'

    # ================================================================================
    # MongoDB 7.0 — Banco de eventos para o order-service (test)
    # ================================================================================
    mongodb-test:
        image: mongo:7.0
        container_name: vibranium-mongodb-test
        ports:
            - '27017:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: admin
            MONGO_INITDB_ROOT_PASSWORD: admin123
            MONGO_INITDB_DATABASE: vibranium_orders
        volumes:
            - mongodb_data_test:/data/db
        networks:
            - vibranium-network-test
        healthcheck:
            test: ['CMD-SHELL', 'mongosh "mongodb://admin:admin123@localhost:27017/test?authSource=admin" --eval "db.runCommand(''ping'').ok" --quiet | grep -q "^1"']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        deploy:
            resources:
                limits:
                    # MongoDB 7.0 requer no mínimo 512M no startup (WiredTiger cache)
                    memory: 512M
                    cpus: '0.5'

    # ================================================================================
    # Redis 7 — Cache para o order book (test)
    # ================================================================================
    redis-test:
        image: redis:7-alpine
        container_name: vibranium-redis-test
        ports:
            - '6379:6379'
        volumes:
            - redis_data_test:/data
        networks:
            - vibranium-network-test
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 3
        deploy:
            resources:
                limits:
                    memory: 256M
                    cpus: '0.25'

    # ================================================================================
    # RabbitMQ 3.13 — Message broker (test)
    # ================================================================================
    rabbitmq-test:
        image: rabbitmq:3.13-management-alpine
        container_name: vibranium-rabbitmq-test
        ports:
            - '5672:5672'
            - '15672:15672'
        environment:
            RABBITMQ_DEFAULT_USER: guest
            RABBITMQ_DEFAULT_PASS: guest
        volumes:
            - rabbitmq_data_test:/var/lib/rabbitmq
        networks:
            - vibranium-network-test
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 20s
        deploy:
            resources:
                limits:
                    memory: 384M
                    cpus: '0.5'

    # ================================================================================
    # Kong 3.4 — API Gateway (test, modo database com PostgreSQL)
    # ================================================================================
    kong-migration-test:
        image: kong:3.4
        container_name: vibranium-kong-migration-test
        restart: 'no'
        environment:
            KONG_DATABASE: postgres
            KONG_PG_HOST: postgresql-test
            KONG_PG_PORT: 5432
            KONG_PG_USER: postgres
            KONG_PG_PASSWORD: postgres123
            KONG_PG_DATABASE: vibranium_infra_test
        depends_on:
            postgresql-test:
                condition: service_healthy
        networks:
            - vibranium-network-test
        command: kong migrations bootstrap

    kong-test:
        image: kong:3.4
        container_name: vibranium-kong-test
        restart: 'no'
        environment:
            KONG_DATABASE: postgres
            KONG_PG_HOST: postgresql-test
            KONG_PG_PORT: 5432
            KONG_PG_USER: postgres
            KONG_PG_PASSWORD: postgres123
            KONG_PG_DATABASE: vibranium_infra_test
            KONG_ADMIN_LISTEN: 0.0.0.0:8001
            KONG_PROXY_LISTEN: 0.0.0.0:8000
            KONG_LOG_LEVEL: error
        ports:
            - '8000:8000'
            - '127.0.0.1:8001:8001'
        depends_on:
            postgresql-test:
                condition: service_healthy
            kong-migration-test:
                condition: service_completed_successfully
        networks:
            - vibranium-network-test
        healthcheck:
            test: ['CMD-SHELL', 'kong health 2>/dev/null | grep -q "Kong is healthy" && curl -sf http://localhost:8001/status >/dev/null 2>&1 || kong health 2>/dev/null | grep -q "Kong is healthy"']
            interval: 5s
            timeout: 3s
            retries: 5
            start_period: 30s
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'

    # ================================================================================
    # Keycloak 22 — Authentication & Authorization (test)
    # Realm importado automaticamente via --import-realm.
    # ================================================================================
    keycloak-test:
        build:
            # Build context = infra/ (Dockerfile.keycloak e recursos de build)
            context: ../infra
            dockerfile: docker/Dockerfile.keycloak
        image: vibranium-keycloak:22.0.5
        container_name: vibranium-keycloak-test
        restart: 'no'
        command:
            - start-dev
            - --import-realm
        environment:
            KC_DB: postgres
            KC_DB_URL: jdbc:postgresql://postgresql-test:5432/vibranium_infra_test
            KC_DB_USERNAME: postgres
            KC_DB_PASSWORD: postgres123
            KC_DB_SCHEMA: keycloak
            KEYCLOAK_ADMIN: admin
            KEYCLOAK_ADMIN_PASSWORD: admin123
            KC_HTTP_ENABLED: 'true'
            KC_HTTP_PORT: 8080
            KC_HOSTNAME_STRICT: 'false'
            KC_HEALTH_ENABLED: 'true'
            KC_LOG_LEVEL: ERROR
            KC_CACHE: local
            # Plugin keycloak-event-listener-rabbitmq
            KK_TO_RMQ_URL: rabbitmq-test
            KK_TO_RMQ_PORT: 5672
            KK_TO_RMQ_USERNAME: guest
            KK_TO_RMQ_PASSWORD: guest
            KK_TO_RMQ_VHOST: /
            KK_TO_RMQ_EXCHANGE: amq.topic
            KK_TO_RMQ_USE_TLS: 'false'
        ports:
            - '8180:8080'
        volumes:
            # Realm exportado a partir do ambiente dev/staging
            - ../infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
        depends_on:
            postgresql-test:
                condition: service_healthy
            rabbitmq-test:
                condition: service_healthy
        networks:
            - vibranium-network-test
        healthcheck:
            test: ['CMD-SHELL', 'exec 3<>/dev/tcp/localhost/8080 && echo -e "GET /health/live HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200 OK" <&3']
            interval: 15s
            timeout: 10s
            retries: 12
            start_period: 90s
        deploy:
            resources:
                limits:
                    memory: 512M
                    cpus: '0.5'

    # ================================================================================
    # Test Runner — Executa mvn clean test e coleta relatórios Surefire
    # ================================================================================
    test-runner:
        build:
            # Build context = project root para acessar pom.xml, apps/ e libs/
            context: ..
            dockerfile: infra/docker/Dockerfile
        container_name: vibranium-test-runner
        environment:
            MAVEN_CONFIG: /root/.m2
            SPRING_PROFILES_ACTIVE: test
        volumes:
            - ../pom.xml:/app/pom.xml
            - ../apps:/app/apps
            - ../libs:/app/libs
            - m2_cache_test:/root/.m2
            # Relatórios de teste persistidos em tests/test-results/ no host
            - ./test-results:/app/test-results
        working_dir: /app
        depends_on:
            mongodb-test:
                condition: service_healthy
            postgresql-test:
                condition: service_healthy
            redis-test:
                condition: service_healthy
            rabbitmq-test:
                condition: service_healthy
            kong-test:
                condition: service_healthy
            keycloak-test:
                condition: service_healthy
        networks:
            - vibranium-network-test
        command: /bin/sh -c "
            echo '=== Running all tests ===' &&
            mvn clean test -U &&
            echo '=== Generating test reports ===' &&
            mkdir -p /app/test-results &&
            find /app -path '*target/surefire-reports/*.xml' -exec cp {} /app/test-results/ \; &&
            echo '=== Test execution completed ==='
            "
        deploy:
            resources:
                limits:
                    memory: 2048M
                    cpus: '2.0'

networks:
    vibranium-network-test:
        driver: bridge

volumes:
    postgresql_data_test:
    mongodb_data_test:
    postgres_data_test:
    redis_data_test:
    rabbitmq_data_test:
    m2_cache_test:
